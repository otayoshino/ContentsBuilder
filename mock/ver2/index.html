    }

    // Undo/Redo用: 付箋非表示（白色化）操作の取り消し・やり直し
    // @param {Array} targets - {el, prevBackground, prevFuhyoji, prevClassName}
    // @param {boolean} redo - trueでやり直し、falseで取り消し
    function applyStickyHideUndo(targets, redo) {
      targets.forEach(({ el, prevBackground, prevFuhyoji, prevClassName }) => {
        if (!el) return;
        if (redo) {
          el.style.background = '#ffffff';
          el.dataset.fuhyoji = '1';
          el.classList.remove('state-visible');
          el.classList.add('state-hidden');
        } else {
          el.style.background = prevBackground || '';
          if (prevFuhyoji === undefined) {
            delete el.dataset.fuhyoji;
          } else {
            el.dataset.fuhyoji = prevFuhyoji;
          }
          // クラス名を元に戻す
          if (prevClassName) {
            el.className = prevClassName;
          }
        }
      });
    }

    function toggleStickyGroup() {
      if (selectedStickySet.size === 0) {
        showToast('付箋を選択してください。');
        return;
      }
      // グループ化/解除前のスナップショットを Undo スタックに積む
      const beforeGroup = [...selectedStickySet].map(n => ({ el: n, prevGroupId: n.dataset.groupId }));
      pushUndo({ type: 'group', targets: beforeGroup });

      // 全選択付箋がグループ化済みかを判定
      const allGrouped = [...selectedStickySet].every(n => n.dataset.groupId);
      if (allGrouped) {
        // 全員グループ済み → 解除
        selectedStickySet.forEach(note => { delete note.dataset.groupId; });
        updateStatus(`${selectedStickySet.size} 件の付箋のグループを解除しました`);
      } else {
        // 未グループのものがある → グループ化
        if (selectedStickySet.size < 2) {
          undoStack.pop(); // pushUndo を取り消す（グループ化失敗のため）
          showToast('2つ以上の付箋を選択してグループ化してください。');
          return;
        }
        const gid = `grp-${++stickyGroupCounter}`;
        selectedStickySet.forEach(note => { note.dataset.groupId = gid; });
        updateStatus(`${selectedStickySet.size} 件の付箋をグループ化しました（${gid}）`);
      }
    }

    /** 現在アクティブなアノテーション種別（null = 描画モード無効） */
    let currentDrawType = null;

    /** 描画開始座標（ページ相対） */
    let drawStartPos = null;

    /** 描画プレビュー要素 */
    let drawPreviewEl = null;

    /** 確定待ちの矩形情報 */
    let pendingRect = null;

    /** アノテーションIDカウンター */
    let annIdCounter = 0;

    /** アノテーション永続化ストレージキー */
    const STORAGE_KEY = 'ContentsBuilder_v2_annotations';
    /** 自動保存デバウンスタイマーID */
    let _autoSaveTimer = null;

    /* ============================
       Undo / Redo（操作履歴）
    ============================ */

    /** Undo スタック（最大 50 件） */
    const undoStack = [];
    /** Redo スタック（最大 50 件） */
    const redoStack = [];
    const UNDO_MAX  = 50;

    /**
     * Undo スタックに操作を積む。
     * 新しい操作が発生したときは Redo スタックをクリアする。
     * @param {Object} op - 操作スナップショット
     */
    function pushUndo(op) {
      undoStack.push(op);
      if (undoStack.length > UNDO_MAX) undoStack.shift();
      // 新しい操作が発生したので Redo 履歴をリセット
      redoStack.length = 0;

    }

    /**
     * 直前の操作を取り消す。
     * op.type ごとに逆操作を実行する。
     */
    function undo() {
      try {
        if (undoStack.length === 0) return;
        const op = undoStack.pop();
        const page = document.getElementById('pageLeft');
        switch (op.type) {
          // --- 付箋非表示（白色化）の取り消し ---
          case 'sticky-hide': {
            applyStickyHideUndo(op.targets, false);
            break;
          }
          // --- 作成の取り消し：要素を削除 ---
          case 'create': {
            op.elements.forEach(el => el.remove());
            deselectAllObjects();
            closeDialog();
            break;
          }
          // --- 削除の取り消し：要素を復元 ---
          case 'delete': {
            op.snapshots.forEach(snap => {
              const el = document.createElement('div');
              el.className = snap.className;
              el.dataset.id = snap.id;
              el.dataset.type = snap.type || '';
              if (snap.savedData)   el.dataset.savedData = snap.savedData;
              if (snap.groupId)     el.dataset.groupId   = snap.groupId;
              if (snap.daimonId)    el.dataset.daimonId  = snap.daimonId;
              if (snap.kotaeId)     el.dataset.kotaeId   = snap.kotaeId;
              if (snap.kotaeOrigBg !== undefined) el.dataset.kotaeOrigBg = snap.kotaeOrigBg;
              if (snap.shomeiId)    el.dataset.shomeiId  = snap.shomeiId;
              el.dataset.page = snap.pageNum || '1';
              el.style.cssText = snap.styleCssText;
              // 種別に応じてハンドラ・内容を設定
              if (el.classList.contains('sticky-note')) {
                addStickyClickHandler(el);
                makeResizable(el);
              } else if (el.classList.contains('daimon-btn')) {
                el.textContent = '大問';
                addDaimonClickHandler(el);
              } else if (el.classList.contains('kotae-btn')) {
                el.textContent = '答';
                addKotaeClickHandler(el);
              } else if (el.classList.contains('shomei-btn')) {
                el.textContent = '証明';
                addShomeiClickHandler(el);
              } else if (el.classList.contains('pagejump-obj')) {
                // ページ遷移オブジェクト：内容なし・専用ハンドラを設定
                addPagejumpObjHandler(el);
                makeResizable(el);
              } else {
                // ann-object / ann-icon-obj
                // savedData からラベルを再構築
                try {
                  const sd  = JSON.parse(snap.savedData || '{}');
                  const cfg = ANNOTATION_TYPE_CONFIG?.[snap.type];
                  if (el.classList.contains('ann-object')) {
                    const span = document.createElement('span');
                    span.className = 'ann-label';
                    span.textContent = (sd.annLabel || '').trim() || cfg?.label || snap.type;
                    el.appendChild(span);
                  } else if (el.classList.contains('ann-icon-obj')) {
                    el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">${cfg?.iconSvg || ''}</svg>`;
                  }
                } catch (_) {}
                addAnnClickHandler(el);
                if (el.classList.contains('ann-object')) makeResizable(el);
              }
              makeDraggable(el);
              page.appendChild(el);
            });
            // 削除時に解除した daimonId / kotaeId / shomeiId を付箋に再付与
            if (op.linkedStickyChanges) {
              op.linkedStickyChanges.forEach(({ el, daimonId, kotaeId, kotaeOrigBg, shomeiId, shomeiOrigBg, shomeiOutline, background, outline }) => {
                if (daimonId    !== undefined) el.dataset.daimonId    = daimonId;
                if (kotaeId     !== undefined) el.dataset.kotaeId     = kotaeId;
                if (kotaeOrigBg !== undefined) el.dataset.kotaeOrigBg = kotaeOrigBg;
                if (shomeiId    !== undefined) el.dataset.shomeiId    = shomeiId;
                if (shomeiOrigBg !== undefined) el.dataset.shomeiOrigBg = shomeiOrigBg;
                if (shomeiOutline !== undefined) el.dataset.shomeiOutline = shomeiOutline;
                if (background  !== undefined) el.style.background   = background;
                if (outline     !== undefined) el.style.outline      = outline;
              });
            }
            break;
          }
          // --- 移動の取り消し：位置を元に戻す ---
          case 'move': {
            op.targets.forEach(({ el, prevLeft, prevTop }) => {
              el.style.left = prevLeft + 'px';
              el.style.top  = prevTop  + 'px';
            });
            // Undo直後のapplyLiveUpdateキャッシュをリセット
            applyLiveUpdate._prevX = parseFloat(document.getElementById('annPosX')?.value)  ?? undefined;
            applyLiveUpdate._prevY = parseFloat(document.getElementById('annPosY')?.value)  ?? undefined;
            applyLiveUpdate._prevW = parseFloat(document.getElementById('annWidth')?.value)  ?? undefined;
            applyLiveUpdate._prevH = parseFloat(document.getElementById('annHeight')?.value) ?? undefined;
            // 選択中のオブジェクトがあればサイドメニューを最新状態で再描画
            const selected = getSelectedObjects?.();
            if (selected && selected.length === 1) {
              openAnnotationSettingsDialog(selected[0].dataset.type || 'sticky', selected[0]);
            }
            updateAlignPanel();
            break;
          }
          // --- リサイズの取り消し ---
          case 'resize': {
            const { el, prevLeft, prevTop, prevWidth, prevHeight } = op;
            el.style.left   = prevLeft   + 'px';
            el.style.top    = prevTop    + 'px';
            el.style.width  = prevWidth  + 'px';
            el.style.height = prevHeight + 'px';
            updateAlignPanel();
            break;
          }
          // --- プロパティ変更の取り消し（複数対応） ---
          case 'prop': {
            if (Array.isArray(op.targets)) {
              op.targets.forEach(({ el, prevSavedData, prevStyleCssText, prevClassName, prevInnerHTML }) => {
                if (prevSavedData    !== undefined) el.dataset.savedData = prevSavedData;
                if (prevStyleCssText !== undefined) el.style.cssText = prevStyleCssText;
                if (prevClassName    !== undefined) el.className = prevClassName;
                if (prevInnerHTML    !== undefined) el.innerHTML = prevInnerHTML;
                reinitElement(el);
              });
            } else {
              const { el, prevSavedData, prevStyleCssText, prevClassName, prevInnerHTML } = op;
              if (prevSavedData    !== undefined) el.dataset.savedData = prevSavedData;
              if (prevStyleCssText !== undefined) el.style.cssText = prevStyleCssText;
              if (prevClassName    !== undefined) el.className = prevClassName;
              if (prevInnerHTML    !== undefined) el.innerHTML = prevInnerHTML;
              reinitElement(el);
            }
            // Undo直後のapplyLiveUpdateキャッシュをリセット
            applyLiveUpdate._prevX = parseFloat(document.getElementById('annPosX')?.value)  ?? undefined;
            applyLiveUpdate._prevY = parseFloat(document.getElementById('annPosY')?.value)  ?? undefined;
            applyLiveUpdate._prevW = parseFloat(document.getElementById('annWidth')?.value)  ?? undefined;
            applyLiveUpdate._prevH = parseFloat(document.getElementById('annHeight')?.value) ?? undefined;
            break;
          }
          // --- グループ化/解除の取り消し ---
          case 'group': {
            op.targets.forEach(({ el, prevGroupId }) => {
              if (prevGroupId === undefined) delete el.dataset.groupId;
              else                           el.dataset.groupId = prevGroupId;
            });
            break;
          }
          // --- 大問ボタン作成の取り消し ---
          case 'daimon-create': {
            op.btn.remove();
            // 紐付けたすべての要素のdaimonIdを作成前の値に戻す
            (op.linkedAll || []).forEach(({ el, prevDaimonId }) => {
              if (prevDaimonId == null || prevDaimonId === '') delete el.dataset.daimonId;
              else el.dataset.daimonId = prevDaimonId;
            });
            break;
          }
          // --- 答ボタン作成の取り消し ---
          case 'kotae-create': {
            op.btn.remove();
            op.linkedStickies.forEach(({ el, prevKotaeId, prevBackground }) => {
              if (prevKotaeId === undefined) delete el.dataset.kotaeId;
              else                           el.dataset.kotaeId = prevKotaeId;
              delete el.dataset.kotaeOrigBg;
              el.style.background = prevBackground;
            });
            break;
          }
          // --- 証明ボタン作成の取り消し ---
          case 'shomei-create': {
            op.btn.remove();
            op.linkedStickies.forEach(({ el, prevShomeiId, prevBackground }) => {
              if (prevShomeiId === undefined) delete el.dataset.shomeiId;
              else                            el.dataset.shomeiId = prevShomeiId;
              delete el.dataset.shomeiOrigBg;
              el.style.outline = '';
              delete el.dataset.shomeiOutline;
              el.style.background = prevBackground;
            });
            break;
          }
        }
        updateAnnotationVisibility();
        updateStatus('操作を取り消しました');
        // Undo の逆操作を Redo スタックに積む
        redoStack.push(op);
        if (redoStack.length > UNDO_MAX) redoStack.shift();
      } catch (err) {
        // エラー内容を右下デバッグUIに表示
        const el = document.getElementById('undoDebug');
        if (el) {
          el.innerHTML += `<br><span style='color:#ff8888'>[Undo Error] ${err && err.message ? err.message : err}</span>`;
          el.style.display = 'block';
        }
        throw err;
      }
    }

    /**
     * 取り消した操作をやり直す。
     * Redo スタックの op.type に応じて再適用する。
     */
    function redo() {
      if (redoStack.length === 0) { showToast('これ以上Redoできません。'); return; }
      const op = redoStack.pop();
      const page = document.getElementById('pageLeft');

      switch (op.type) {
        // --- 付箋非表示（白色化）のやり直し ---
        case 'sticky-hide': {
          applyStickyHideUndo(op.targets, true);
          break;
        }
        // --- 作成の再適用：要素を再追加 ---
        case 'create': {
          op.elements.forEach(el => page.appendChild(el));
          break;
        }
        // --- 削除の再適用：要素を再削除 ---
        case 'delete': {
          op.snapshots.forEach(snap => {
            const el = page.querySelector(`[data-id="${snap.id}"]`);
            if (el) el.remove();
          });
          deselectAllObjects();
          closeDialog();
          break;
        }
        // --- 移動の再適用 ---
        case 'move': {
          op.targets.forEach(({ el, afterLeft, afterTop }) => {
            if (afterLeft !== undefined) el.style.left = afterLeft + 'px';
            if (afterTop  !== undefined) el.style.top  = afterTop  + 'px';
          });
          updateAlignPanel();
          break;
        }
        // --- グループ化/解除の再適用 ---
        case 'group': {
          // group op は before のみ保持のためスキップ
          break;
        }
        // --- 大問ボタン作成の再適用 ---
        case 'daimon-create': {
          page.appendChild(op.btn);
          (op.linkedAll || []).forEach(({ el, prevDaimonId }) => {
            el.dataset.daimonId = op.btn.dataset.daimonId;
          });
          break;
        }
        // --- 答ボタン作成の再適用 ---
        case 'kotae-create': {
          page.appendChild(op.btn);
          op.linkedStickies.forEach(({ el }) => {
            el.dataset.kotaeId  = op.btn.dataset.kotaeId;
            el.style.background = '#ffffff';
          });
          break;
        }
        // --- 証明ボタン作成の再適用 ---
        case 'shomei-create': {
          page.appendChild(op.btn);
          op.linkedStickies.forEach(({ el }) => {
            el.dataset.shomeiId = op.btn.dataset.shomeiId;
            el.style.background = '#ffffff';
            el.style.outline    = '';
          });
          break;
        }
        default: break;
      }

      // Redo 履歴を Undo スタックに戻す（redoStack はクリアしない）
      undoStack.push(op);
      if (undoStack.length > UNDO_MAX) undoStack.shift();
      updateAnnotationVisibility();
      updateStatus('操作をやり直しました');
      updateAlignPanel();
      // Redo直後のapplyLiveUpdateキャッシュをサイドメニュー入力欄の値で初期化
      applyLiveUpdate._prevX = parseFloat(document.getElementById('annPosX')?.value)  ?? undefined;
      applyLiveUpdate._prevY = parseFloat(document.getElementById('annPosY')?.value)  ?? undefined;
      applyLiveUpdate._prevW = parseFloat(document.getElementById('annWidth')?.value)  ?? undefined;
      applyLiveUpdate._prevH = parseFloat(document.getElementById('annHeight')?.value) ?? undefined;
      // 選択中のオブジェクトがあればサイドメニューを最新状態で再描画
      const selected = getSelectedObjects?.();
      if (selected && selected.length === 1) {
        openAnnotationSettingsDialog(selected[0].dataset.type || 'sticky', selected[0]);
      }
    }

    /**
     * ページ内の全オブジェクトを選択状態にする。
     * オーサリングモード時のみ有効。
     */
    function selectAllObjects() {
      if (document.body.classList.contains('is-view-mode')) return;
      const page = document.getElementById('pageLeft');
      // 付箋
      page.querySelectorAll('.sticky-note:not(.ann-hidden-page)').forEach(n => {
        selectedStickySet.add(n);
        n.classList.add('is-selected');
      });
      // その他オブジェクト
      page.querySelectorAll('.ann-object:not(.ann-hidden-page), .ann-icon-obj:not(.ann-hidden-page), .daimon-btn:not(.ann-hidden-page), .kotae-btn:not(.ann-hidden-page), .shomei-btn:not(.ann-hidden-page)')
        .forEach(a => a.classList.add('is-selected'));
      const total = page.querySelectorAll('.sticky-note:not(.ann-hidden-page), .ann-object:not(.ann-hidden-page), .ann-icon-obj:not(.ann-hidden-page), .daimon-btn:not(.ann-hidden-page), .kotae-btn:not(.ann-hidden-page), .shomei-btn:not(.ann-hidden-page)').length;
      updateStatus(`全オブジェクトを選択しました（${total}件）`);
      updateAlignPanel();
    }

    /** ドラッグ選択（ラバーバンド）の開始座標（ページ相対px） */
    let dragSelectStartPos = null;

    /** ドラッグ選択開始座標（clientX/Y：fixed配置の破線描画用） */
    let dragSelectClientStart = null;

    /** ドラッグ選択中フラグ */
    let isDragSelecting = false;

    /** ドラッグ選択プレビュー要素 */
    let dragSelectPreviewEl = null;

    /** 描画ドラッグ開始座標（clientX/Y：fixed配置のプレビュー描画用） */
    let drawClientStart = null;

    /**
     * ドラッグ選択中のマウス移動をドキュメントレベルで追跡し、破線矩形を更新する。
     * position:fixed で body に貼り付けるためページ外でも描画される。
     * @param {MouseEvent} e
     */
    function onDragSelectMove(e) {
      if (!isDragSelecting || !dragSelectClientStart) return;
      const DRAG_THRESHOLD = 4;
      const dx = Math.abs(e.clientX - dragSelectClientStart.x);
      const dy = Math.abs(e.clientY - dragSelectClientStart.y);
      // 閾値未満はまだクリック扱い：破線を表示しない
      if (dx < DRAG_THRESHOLD && dy < DRAG_THRESHOLD) return;
      // 一度閾値を超えたら破線要素を作成（まだ存在しない場合のみ）
      if (!dragSelectPreviewEl) {
        dragSelectPreviewEl = document.createElement('div');
        dragSelectPreviewEl.className = 'drag-select-rect';
        dragSelectPreviewEl.style.position      = 'fixed';
        dragSelectPreviewEl.style.pointerEvents = 'none';
        document.body.appendChild(dragSelectPreviewEl);
      }
      dragSelectPreviewEl.style.left   = Math.min(e.clientX, dragSelectClientStart.x) + 'px';
      dragSelectPreviewEl.style.top    = Math.min(e.clientY, dragSelectClientStart.y) + 'px';
      dragSelectPreviewEl.style.width  = Math.abs(e.clientX - dragSelectClientStart.x) + 'px';
      dragSelectPreviewEl.style.height = Math.abs(e.clientY - dragSelectClientStart.y) + 'px';
    }

    /**
     * ドラッグ選択を強制的にキャンセルし、破線プレビューを除去する。
     * 右クリック・ESCキー・ウィンドウのフォーカス喪失など、
     * mouseup 以外の割り込みで中断された場合に呼ぶ。
     */
    function cancelDragSelect() {
      if (!isDragSelecting) return;
      isDragSelecting = false;
      document.removeEventListener('mousemove', onDragSelectMove);
      dragSelectPreviewEl?.remove();
      dragSelectPreviewEl   = null;
      dragSelectClientStart = null;
      dragSelectStartPos    = null;
    }

    /**
     * 描画ドラッグ中のマウス移動をドキュメントレベルで追跡し、プレビュー矩形を更新する。
     * position:fixed で body に貼り付けるためページ外でも描画される。
     * @param {MouseEvent} e
     */
    function onDrawPreviewMove(e) {
      if (!drawStartPos || !drawPreviewEl || !drawClientStart) return;
      drawPreviewEl.style.left   = Math.min(e.clientX, drawClientStart.x) + 'px';
      drawPreviewEl.style.top    = Math.min(e.clientY, drawClientStart.y) + 'px';
      drawPreviewEl.style.width  = Math.abs(e.clientX - drawClientStart.x) + 'px';
      drawPreviewEl.style.height = Math.abs(e.clientY - drawClientStart.y) + 'px';
    }

    /** Spaceキーが押されているか（パンモード） */
    let isSpaceHeld = false;

    /** パン（ビュースクロール）操作中かどうか */
    let isPanning = false;

    /** パン開始時のマウス座標（オフセット基準値） */
    let panStartX = 0, panStartY = 0;

    /** 現在のページコンテナのパンオフセット */
    let panOffsetX = 0, panOffsetY = 0;

    /** 連続作成モード用：前回使用した設定を種別ごとに保存 */
    const lastNewAnnData = {};

    /** 付箋グループIDカウンター */
    let stickyGroupCounter = 0;

    /** 付箋背景色マップ（dialogConfigs.stickyの annColor 選択肢インデックスに対応） */
    const STICKY_COLOR_MAP = ['#4488cc', '#5ac46e', '#f7e04b'];

    /** Shift+クリックで複数選択中の付箋要素セット */
    const selectedStickySet = new Set();

    /**
     * アノテーションコピー用クリップボード。
     * 各エントリは選択時のスナップショットを保持する。
     * @type {Array<{type:string, className:string, savedData:string, left:number, top:number, width:number, height:number, background:string, groupId:string|undefined}>}
     */
    let annClipboard = [];

    /**
     * 選択中の全オブジェクト（付箋・アノテーション）をクリップボードにコピーする。
     * 実際の配置は行わず、パラメータをスナップショットとして保存するだけ。
     */
    function copySelectedObjects() {
      if (document.body.classList.contains('is-view-mode')) return;
      const targets = getSelectedObjects();
      if (targets.length === 0) { showToast('コピーするオブジェクトを選択してください。'); return; }

      annClipboard = targets.map(el => {
        const snap = {
          type:       el.dataset.type || 'sticky',
          className:  el.className.replace(/\bis-selected\b/g, '').trim(),
          savedData:  el.dataset.savedData || '{}',
          left:       parseFloat(el.style.left)   || 0,
          top:        parseFloat(el.style.top)    || 0,
          width:      parseFloat(el.style.width)  || el.offsetWidth,
          height:     parseFloat(el.style.height) || el.offsetHeight,
          background: el.style.background || '',
          groupId:    el.dataset.groupId,
        };
        // 証明ボタン：shomeiId と紐付き付箋のスナップショットを保存
        if (el.classList.contains('shomei-btn') && el.dataset.shomeiId) {
          snap.shomeiId = el.dataset.shomeiId;
          snap.linkedStickies = [...document.querySelectorAll(`.sticky-note[data-shomei-id="${el.dataset.shomeiId}"]`)].map(n => ({
            left:       parseFloat(n.style.left)   || 0,
            top:        parseFloat(n.style.top)    || 0,
            width:      parseFloat(n.style.width)  || n.offsetWidth,
            height:     parseFloat(n.style.height) || n.offsetHeight,
            background: n.style.background || '#ffffff',
            savedData:  n.dataset.savedData || '{}',
            groupId:    n.dataset.groupId,
          }));
        }
        // 付箋が shomei-btn と一緒にコピーされた場合、shomeiId を保存（重複排除用）
        if (el.classList.contains('sticky-note') && el.dataset.shomeiId) {
          snap.shomeiId = el.dataset.shomeiId;
        }
        // 答ボタン：kotaeId と紐付き付箋のスナップショットを保存
        if (el.classList.contains('kotae-btn') && el.dataset.kotaeId) {
          snap.kotaeId = el.dataset.kotaeId;
          snap.linkedStickies = [...document.querySelectorAll(`.sticky-note[data-kotae-id="${el.dataset.kotaeId}"]`)].map(n => ({
            left:       parseFloat(n.style.left)   || 0,
            top:        parseFloat(n.style.top)    || 0,
            width:      parseFloat(n.style.width)  || n.offsetWidth,
            height:     parseFloat(n.style.height) || n.offsetHeight,
            background: n.style.background || '#ffffff',
            savedData:  n.dataset.savedData || '{}',
            groupId:    n.dataset.groupId,
          }));
        }
        // 付箋が kotae-btn と一緒にコピーされた場合、kotaeId を保存（重複排除用）
        if (el.classList.contains('sticky-note') && el.dataset.kotaeId) {
          snap.kotaeId = el.dataset.kotaeId;
        }
        return snap;
      });
      updateStatus(`${annClipboard.length} 件のオブジェクトをコピーしました`);
    }

    /**
     * クリップボードの内容をページに貼り付ける。
     * 貼り付けたオブジェクトは元の位置から 16px ずらして配置し、選択状態にする。
     */
    function pasteClipboard() {
      if (document.body.classList.contains('is-view-mode')) return;
      if (annClipboard.length === 0) { showToast('貼り付けるオブジェクトがありません。'); return; }
      const OFFSET = 16;
      const page   = document.getElementById('pageLeft');

      // 1回目のペーストからコピー元より OFFSET 分だけ斜め下にずらして配置する
      const dx = OFFSET;
      const dy = OFFSET;

      // 貼り付け前の選択を全解除
      deselectAllObjects();

      // shomei-btn と同じ shomeiId を持つ付箋スナップは shomei-btn 側で複製するためスキップ
      const skipShomeiStickyIds = new Set(
        annClipboard
          .filter(s => s.className?.includes('shomei-btn') && s.shomeiId)
          .map(s => s.shomeiId)
      );
      // kotae-btn と同じ kotaeId を持つ付箋スナップは kotae-btn 側で複製するためスキップ
      const skipKotaeStickyIds = new Set(
        annClipboard
          .filter(s => s.className?.includes('kotae-btn') && s.kotaeId)
          .map(s => s.kotaeId)
      );

      const pasted = [];
      annClipboard.forEach(snap => {
        const newLeft = snap.left + dx;
        const newTop  = snap.top  + dy;

        // shomei-btn と一緒にコピーされた付箋はスキップ（shomei-btn 側で作成済み）
        if (snap.type === 'sticky' && snap.shomeiId && skipShomeiStickyIds.has(snap.shomeiId)) return;

        // kotae-btn と一緒にコピーされた付箋はスキップ（kotae-btn 側で作成済み）
        if (snap.type === 'sticky' && snap.kotaeId && skipKotaeStickyIds.has(snap.kotaeId)) return;

        // 証明ボタン：新 shomeiId で shomei-btn と紐付き付箋を独立複製
        if (snap.className?.includes('shomei-btn')) {
          const newShomeiId = `shomei-${++shomeiCounter}`;
          const btn = document.createElement('div');
          btn.dataset.id        = ++annIdCounter;
          btn.dataset.type      = 'shomei';
          btn.dataset.shomeiId  = newShomeiId;
          btn.className         = 'shomei-btn';
          btn.textContent       = '証明';
          btn.style.cssText     = `left:${newLeft}px; top:${newTop}px;`;
          addShomeiClickHandler(btn);
          makeDraggable(btn);
          btn.dataset.page = currentPage;
          page.appendChild(btn);
          btn.classList.add('is-selected');
          pasted.push(btn);
          (snap.linkedStickies || []).forEach(ns => {
            const note = document.createElement('div');
            note.dataset.id       = ++annIdCounter;
            note.dataset.type     = 'sticky';
            note.dataset.shomeiId = newShomeiId;
            note.dataset.savedData = ns.savedData || '{}';
            if (ns.groupId) note.dataset.groupId = ns.groupId;
            note.className        = 'sticky-note state-visible';
            note.style.cssText    = `left:${ns.left + dx}px; top:${ns.top + dy}px; width:${ns.width}px; height:${ns.height}px;`;
            note.style.background = '#ffffff';
            addStickyClickHandler(note);
            makeDraggable(note);
            makeResizable(note);
            note.dataset.page = currentPage;
            page.appendChild(note);
            pasted.push(note);
          });
          return;
        }

        // 答ボタン：新 kotaeId で kotae-btn と紐付き付箋を独立複製
        if (snap.className?.includes('kotae-btn')) {
          const newKotaeId = `kotae-${++kotaeCounter}`;
          const btn = document.createElement('div');
          btn.dataset.id       = ++annIdCounter;
          btn.dataset.type     = 'kotae';
          btn.dataset.kotaeId  = newKotaeId;
          btn.className        = 'kotae-btn';
          btn.textContent      = '答';
          btn.style.cssText    = `left:${newLeft}px; top:${newTop}px;`;
          addKotaeClickHandler(btn);
          makeDraggable(btn);
          btn.dataset.page = currentPage;
          page.appendChild(btn);
          btn.classList.add('is-selected');
          pasted.push(btn);
          (snap.linkedStickies || []).forEach(ns => {
            const note = document.createElement('div');
            note.dataset.id      = ++annIdCounter;
            note.dataset.type    = 'sticky';
            note.dataset.kotaeId = newKotaeId;
            note.dataset.savedData = ns.savedData || '{}';
            if (ns.groupId) note.dataset.groupId = ns.groupId;
            note.className       = 'sticky-note state-visible';
            note.style.cssText   = `left:${ns.left + dx}px; top:${ns.top + dy}px; width:${ns.width}px; height:${ns.height}px;`;
            note.style.background = '#ffffff';
            addStickyClickHandler(note);
            makeDraggable(note);
            makeResizable(note);
            note.dataset.page = currentPage;
            page.appendChild(note);
            pasted.push(note);
          });
          return;
        }

        const el = document.createElement('div');
        el.dataset.id        = ++annIdCounter;
        el.dataset.type      = snap.type;
        el.dataset.savedData = snap.savedData;
        if (snap.groupId) el.dataset.groupId = snap.groupId;

        if (snap.type === 'sticky') {
          el.className = 'sticky-note state-visible';
          el.style.cssText = [
            `left:${newLeft}px`,
            `top:${newTop}px`,
            `width:${snap.width}px`,
            `height:${snap.height}px`,
            `background:${snap.background}`,
          ].join('; ') + ';';
          addStickyClickHandler(el);
          makeDraggable(el);
          makeResizable(el);
          selectedStickySet.add(el);
        } else {
          // アイコン型はサイズなし、マーカー型はサイズあり
          const isIcon = snap.className.includes('ann-icon-obj');
          el.className = isIcon ? 'ann-icon-obj' : 'ann-object';
          if (isIcon) {
            el.style.cssText = `left:${newLeft}px; top:${newTop}px;`;
            const cfg = ANNOTATION_TYPE_CONFIG[snap.type];
            if (cfg) el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">${cfg.iconSvg}</svg>`;
          } else {
            el.style.cssText = [
              `left:${newLeft}px`,
              `top:${newTop}px`,
              `width:${snap.width}px`,
              `height:${snap.height}px`,
              `background:${snap.background}`,
            ].join('; ') + ';';
            // ラベルを savedData から復元
            try {
              const sd = JSON.parse(snap.savedData);
              const cfg = ANNOTATION_TYPE_CONFIG[snap.type];
              const labelSpan = document.createElement('span');
              labelSpan.className   = 'ann-label';
              labelSpan.textContent = (sd.annLabel || '').trim() || cfg?.label || snap.type;
              el.appendChild(labelSpan);
            } catch (_) {}
            makeResizable(el);
          }
          addAnnClickHandler(el);
          makeDraggable(el);
        }

        el.dataset.page = currentPage;
        el.classList.add('is-selected');
        page.appendChild(el);
        pasted.push(el);
      });

      // 連続ペースト時は次回を OFFSET ずらして重なりを避ける（linkedObj の位置も更新）
      annClipboard = annClipboard.map(s => {
        const updated = { ...s, left: s.left + OFFSET, top: s.top + OFFSET };
        if (s.linkedObj) {
          updated.linkedObj = { ...s.linkedObj, left: s.linkedObj.left + OFFSET, top: s.linkedObj.top + OFFSET };
        }
        if (s.linkedStickies) {
          updated.linkedStickies = s.linkedStickies.map(ns => ({ ...ns, left: ns.left + OFFSET, top: ns.top + OFFSET }));
        }
        return updated;
      });

      // 最後のオブジェクトでサイドバーを更新
      if (pasted.length > 0) {
        const last = pasted[pasted.length - 1];
        openAnnotationSettingsDialog(last.dataset.type || 'sticky', last);
      }
      pushUndo({ type: 'create', elements: [...pasted] });
      updateStatus(`${pasted.length} 件のオブジェクトを貼り付けました`);
      updateAlignPanel();
    }

    /**

    function activateAnnotationMode(type) {
      // 同じボタンを再度押したらモードを解除（トグル）＆選択解除
      if (currentDrawType === type) {
        deactivateAnnotationMode();
        deselectAllObjects();
        closeDialog();

      // 別ボタンへ切り替え：選択中オブジェクトを解除してから切り替える
      deselectAllObjects();

      document.querySelectorAll('li[data-ann-type]').forEach(li => li.classList.remove('is-ann-active'));

      currentDrawType = null;

      if (drawPreviewEl) {
        drawPreviewEl.remove();
        drawPreviewEl = null;
      }
      drawStartPos = null;
    }

    /**
     * マウス座標をページ相対座標に変換する。
     * @param {MouseEvent} e
     * @returns {{x: number, y: number}}
     */
    function getPageRelativePos(e) {
      // getBoundingClientRect は視覚座標（CSS scale適用後）を返すため、
      // scaleで除してベース座標（オブジェクトのleft/topと同じ坐標系）に変換する。
      const rect  = document.getElementById('pageLeft').getBoundingClientRect();
      const scale = zoomLevel / 100;
      return {
        x: Math.max(0, Math.min(e.clientX - rect.left, rect.width))  / scale,
        y: Math.max(0, Math.min(e.clientY - rect.top,  rect.height)) / scale
      };
    }

    /**
     * 描画：マウスダウン処理。
     * @param {MouseEvent} e
     */
    function onPageMouseDown(e) {
      // Spacパンモード中は描画・選択処理をスキップ（バブリングで viewArea のリスナーが起動する）
      if (isSpaceHeld) return;
      // 閲覧モード中はドラッグ選択を禁止
      if (document.body.classList.contains('is-view-mode')) return;
      // 描画モードでない場合
      if (!currentDrawType) {
        // 付箋・アノテーション・リサイズハンドル以外の場所をクリックしたらドラッグ選択を開始
        if (!e.target.closest('.sticky-note') &&
            !e.target.closest('.ann-object') &&
            !e.target.closest('.ann-icon-obj') &&
            !e.target.closest('.resize-handle') &&
            !e.target.closest('#selectionBoundingBox')) {
          e.preventDefault();
          dragSelectStartPos   = getPageRelativePos(e);
          dragSelectClientStart = { x: e.clientX, y: e.clientY };
          isDragSelecting = true;
          // dragSelectPreviewEl はマウスが実際に動いた時点（onDragSelectMove 内）で作成する
          document.addEventListener('mousemove', onDragSelectMove);
        }
        return;
      }
      e.preventDefault();
      drawStartPos    = getPageRelativePos(e);
      drawClientStart = { x: e.clientX, y: e.clientY };
      drawPreviewEl = document.createElement('div');
      drawPreviewEl.className       = 'draw-preview';
      // position:fixed で body に追加することでページ外にもプレビューを描画できる
      drawPreviewEl.style.position      = 'fixed';
      drawPreviewEl.style.pointerEvents = 'none';
      drawPreviewEl.style.left   = e.clientX + 'px';
      drawPreviewEl.style.top    = e.clientY + 'px';
      drawPreviewEl.style.width  = '0px';
      drawPreviewEl.style.height = '0px';
      document.body.appendChild(drawPreviewEl);
      document.addEventListener('mousemove', onDrawPreviewMove);
    }

    /**
     * 描画：マウスムーブ処理。
     * @param {MouseEvent} e
     */
    function onPageMouseMove(e) {
      // ドラッグ選択・描画はドキュメントレベルのハンドラで処理するためスキップ
      if (isDragSelecting) return;
      if (drawStartPos && drawPreviewEl) return;
    }

    /**
     * 描画：マウスアップ処理。矩形を確定して設定ダイアログを開く。
     * @param {MouseEvent} e
     */
    function onPageMouseUp(e) {
      // ドラッグ選択の確定処理
      if (isDragSelecting) {
        isDragSelecting = false;
        document.removeEventListener('mousemove', onDragSelectMove);
        dragSelectPreviewEl?.remove();
        dragSelectPreviewEl   = null;
        dragSelectClientStart = null;
        const start = dragSelectStartPos;
        dragSelectStartPos = null;
        if (start) {
          const endPos = getPageRelativePos(e);
          const x = Math.min(endPos.x, start.x);
          const y = Math.min(endPos.y, start.y);
          const w = Math.abs(endPos.x - start.x);
          const h = Math.abs(endPos.y - start.y);
          if (w < 5 && h < 5) {
            // ほぼクリック扱い：選択を全解除
            deselectAllObjects();
          } else {
            // ドラッグ選択を確定し矩形内のオブジェクトを選択状態にする
            finalizeDragSelect(x, y, w, h, e.shiftKey);
          }
        }
        return;
      }
      if (!currentDrawType || !drawStartPos) return;
      e.preventDefault();
      document.removeEventListener('mousemove', onDrawPreviewMove);
      const pos  = getPageRelativePos(e);
      const x    = Math.min(pos.x, drawStartPos.x);
      const y    = Math.min(pos.y, drawStartPos.y);
      const w    = Math.abs(pos.x - drawStartPos.x);
      const h    = Math.abs(pos.y - drawStartPos.y);
      const type = currentDrawType;

      // 描画プレビューをリセット（モードは維持して連続作成を可能にする）
      if (drawPreviewEl) {
        drawPreviewEl.remove();
        drawPreviewEl   = null;
        drawClientStart = null;
      }
      drawStartPos = null;

      // クリックのみ（ほぼ移動なし）の場合：クイック作成ポップアップを表示
      if (w < 10 && h < 10) {
        openQuickCreateDialog(type, x, y, e.clientX, e.clientY);
        return;
      }

      // ページ遷移オブジェクト：ドラッグ作成時もポップアップを表示して遷移先を設定させる
      if (type === 'pagejump') {
        pendingRect = { x, y, w, h };
        openQuickCreateDialog(type, x + w / 2, y + h / 2, e.clientX, e.clientY);
        return;
      }

      // ドラッグ作成：ポップアップなし・マーカー形式で即時作成
      pendingRect = { x, y, w, h };
      const _specForm = document.getElementById('dialogFormSpecific');
      if (_specForm) {
        const _dtEl = _specForm.querySelector('#annDisplayType');
        if (_dtEl) {
          _dtEl.value = 'marker';
        } else {
          const _inp = document.createElement('input');
          _inp.type = 'hidden'; _inp.id = 'annDisplayType'; _inp.value = 'marker';
          _inp.dataset.qcInject = '1';
          _specForm.appendChild(_inp);
        }
      }
      confirmAnnotation(type);
      if (_specForm) _specForm.querySelectorAll('[data-qc-inject]').forEach(e => e.remove());
    }

     * quick-popup と同じ構造を使い、確定時に confirmAnnotation(type, el) を呼んで更新する。

      // ポップアップを対象要素の右隣に表示（ビューポートを超えないよう補正）
      const elRect = el.getBoundingClientRect();

    /**
     * クリックのみでオブジェクトを作成する際のクイック設定ポップアップを表示する。
     * @param {string} type     - アノテーション種別
     * @param {number} pageX    - ページ相対X座標（配置位置）
     * @param {number} pageY    - ページ相対Y座標（配置位置）
     * @param {number} clientX  - ビューポートX座標（ポップアップ表示位置）
     * @param {number} clientY  - ビューポートY座標（ポップアップ表示位置）
     */
    function openQuickCreateDialog(type, pageX, pageY, clientX, clientY) {
      // 既存ポップアップを削除
      const existing = document.getElementById('quickCreatePopup');
      if (existing) existing.remove();

      const cfg      = ANNOTATION_TYPE_CONFIG[type];
      const prevData = lastNewAnnData[type] || {};

      // ポップアップシェルを生成（フォーム内容は buildCommonFields/buildSpecificFields が埋める）
      const popup = document.createElement('div');
      popup.id        = 'quickCreatePopup';
      popup.className = 'quick-popup dialog-box';
      popup.innerHTML = `
        <div class="dialog-title">
          <p>■ ${cfg.label}を作成</p>
          <span id="qcCloseBtn">×</span>
        </div>
        <div class="dialog-contents">
          <div class="side-detail-form" style="margin:0 0 6px;">
            <dl id="qcFormCommon"></dl>

            <div class="detail-section-sep" style="margin:6px 0;">種別設定</div>

              <dl id="qcFormSpecific"></dl>

          </div>

          <button class="dialog-btn ok"     id="qcOkBtn">&gt; 作成する</button>
        </div>
      `;

      // DOM に追加してからフォームフィールドを生成（ID参照が必要なため）
      document.body.appendChild(popup);

      // ドラッグ経由（pendingRect がセット済み）の場合はそのサイズ・位置をフォームに初期値として反映する
      buildCommonFields(document.getElementById('qcFormCommon'), type, prevData, pendingRect || null);

      if (type !== 'sticky') {
        buildSpecificFields(document.getElementById('qcFormSpecific'), type, prevData);
        document.getElementById('qcSepWrap').style.display = '';
      }

      // ポップアップをビューポート内に収まる位置に配置
      const pw   = popup.offsetWidth  || 310;
      const ph   = popup.offsetHeight || 260;
      const left = Math.min(clientX + 8, window.innerWidth  - pw - 8);
      const top  = Math.min(clientY + 8, window.innerHeight - ph - 8);
      popup.style.left = Math.max(8, left) + 'px';
      popup.style.top  = Math.max(8, top)  + 'px';

      // ボタンイベントを設定
      document.getElementById('qcOkBtn').onclick     = () => confirmQuickCreate(type, pageX, pageY);
      document.getElementById('qcCancelBtn').onclick = closeQuickCreateDialog;
      document.getElementById('qcCloseBtn').onclick  = closeQuickCreateDialog;

      updateStatus(`${cfg.label}を設定して「作成」を押してください`);

    /**

    /**
     * クイック作成ポップアップで確定し、オブジェクトをページに配置する。
     * クリック位置がオブジェクトの中央になるよう pendingRect を設定してから
     * confirmAnnotation() を呼び出す。
     * @param {string} type  - アノテーション種別
     * @param {number} pageX - ページ相対X座標
     * @param {number} pageY - ページ相対Y座標
     */
    function confirmQuickCreate(type, pageX, pageY) {
      // ポップアップフォームから値を収集し、サイドバーの共通/種別固有フォームに転写する
      ['qcFormCommon', 'qcFormSpecific'].forEach((srcId, i) => {
        const src  = document.getElementById(srcId);
        const dest = document.getElementById(['dialogFormCommon', 'dialogFormSpecific'][i]);
        if (!src || !dest) return;
        src.querySelectorAll('input[id], select[id], textarea[id]').forEach(srcEl => {
          // 封到済みの要素があれば値を上書き、なければ hidden input を挿入
          const destEl = dest.querySelector(`[id="${srcEl.id}"]`);
          if (destEl) {
            destEl.value = srcEl.value;
          } else {
            const inp = document.createElement('input');
            inp.type = 'hidden'; inp.id = srcEl.id; inp.value = srcEl.value;
            inp.dataset.qcInject = '1';
            dest.appendChild(inp);
          }
        });
      });

      const qcCommon = document.getElementById('qcFormCommon');
      const w = Math.max(parseFloat(qcCommon?.querySelector('[id="annWidth"]')?.value)  || 120, 10);
      const h = Math.max(parseFloat(qcCommon?.querySelector('[id="annHeight"]')?.value) || 40,  10);
      closeQuickCreateDialog();

      // ドラッグ経由で pendingRect がセット済みの場合はそれを優先し、クリック経由はクリック位置を中央に配置
      if (!pendingRect) {
        pendingRect = { x: pageX - w / 2, y: pageY - h / 2, w, h };
      }
      confirmAnnotation(type);

      // 注入した hidden input を二次防止のため後片付けで削除
      ['dialogFormCommon', 'dialogFormSpecific'].forEach(id => {
        const form = document.getElementById(id);
        if (form) form.querySelectorAll('[data-qc-inject]').forEach(e => e.remove());
      });
    }

    /**
     * スピンボタン付き数値入力フィールド（.pos-field）を生成する。
     * スピンボタンは入力窓の左側に縦並びで配置し、入力窓と同じ背景色を使用する。
     * @param {string} id    - input 要素に付与する id
     * @param {number} value - 初期値
     * @returns {HTMLElement} .pos-field 要素
     */
    function makePosField(id, value) {
      const field = document.createElement('div');
      field.className = 'pos-field';
      field.innerHTML = `
        <div class="spin-btns">
          <button type="button" class="spin-btn spin-up">▲</button>
          <button type="button" class="spin-btn spin-down">▼</button>
        </div>
        <input type="number" class="d-input d-input-sm" id="${id}" value="${value}">
      `;
      const input = field.querySelector('input');
      // スピンアップ：+1
      field.querySelector('.spin-up').addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = (parseInt(input.value, 10) || 0) + 1;
        input.dispatchEvent(new Event('input'));
      });
      // スピンダウン：-1（0未満にしない）
      field.querySelector('.spin-down').addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = Math.max(0, (parseInt(input.value, 10) || 0) - 1);
        input.dispatchEvent(new Event('input'));
      });
      return field;
    }

    function buildCommonFields(form, type, savedData, initRect) {
      const px = initRect ? Math.round(initRect.x) : (parseInt(savedData.annPosX,   10) || 0);
      const py = initRect ? Math.round(initRect.y) : (parseInt(savedData.annPosY,   10) || 0);
      const pw = initRect ? Math.round(initRect.w) : (parseInt(savedData.annWidth,  10) || 100);
      const ph = initRect ? Math.round(initRect.h) : (parseInt(savedData.annHeight, 10) || 100);

      // --- 位置 ---
      const posDt = document.createElement('dt');
      posDt.textContent = '位置';
      form.appendChild(posDt);
      const posDd = document.createElement('dd');
      const posRow = document.createElement('div');
      posRow.className = 'pos-row';
      ['X','Y'].forEach((label, i) => {
        const sp = document.createElement('span');
        sp.textContent = label;
        posRow.appendChild(sp);
        posRow.appendChild(makePosField(['annPosX','annPosY'][i], [px, py][i]));
      });
      posDd.appendChild(posRow);
      form.appendChild(posDd);

      // --- 変形 ---
      const szDt = document.createElement('dt');
      szDt.textContent = '変形';
      szDt.dataset.fieldGroup = 'transform';
      form.appendChild(szDt);
      const szDd = document.createElement('dd');
      szDd.dataset.fieldGroup = 'transform';
      const szRow = document.createElement('div');
      szRow.className = 'pos-row';
      ['W','H'].forEach((label, i) => {
        const sp = document.createElement('span');
        sp.textContent = label;
        szRow.appendChild(sp);
        szRow.appendChild(makePosField(['annWidth','annHeight'][i], [pw, ph][i]));
      });
      szDd.appendChild(szRow);
      form.appendChild(szDd);

      // --- 塗り色（付箋は STICKY_COLORS、それ以外は ANN_COLOR_OPTIONS） ---
      const colDt = document.createElement('dt');
      colDt.textContent = '塗り';
      colDt.dataset.fieldGroup = 'fill';
      form.appendChild(colDt);
      const colDd = document.createElement('dd');
      colDd.dataset.fieldGroup = 'fill';
      colDd.className = 'color-row';
      const colWrap = document.createElement('div');
      colWrap.className = 'd-select-wrap';
      const colSel = document.createElement('select');
      colSel.className = 'd-select';
      colSel.id = 'annColor';
      const colorList = (type === 'sticky') ? STICKY_COLORS : ANN_COLOR_OPTIONS;
      colorList.forEach((c, i) => {
        const o = document.createElement('option');
        o.value = i;
        o.textContent = c.label;
        colSel.appendChild(o);
      });
      colSel.value = savedData.annColor || '0';
      colWrap.appendChild(colSel);
      colDd.appendChild(colWrap);
      form.appendChild(colDt);
      form.appendChild(colDd);

      // ページ遷移オブジェクト・透明ページリンクは塗り色を使用しないため非活性化
      if (type === 'pagejump' || (type === 'pagelink' && savedData.annDisplayType === 'white-area')) {
        colDt.classList.add('is-field-disabled');
        colDd.classList.add('is-field-disabled');
        colSel.disabled = true;
      }

      // 選択中オブジェクトへの即時反映リスナーを登録
      // サイドメニュー・ダイアログ両対応でUndoが積まれるよう、input/change両方でapplyLiveUpdateを呼ぶ
      ['annPosX', 'annPosY', 'annWidth', 'annHeight'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', () => applyLiveUpdate(type));
          el.addEventListener('change', () => applyLiveUpdate(type));
        }
      });
      const colElForLive = document.getElementById('annColor');
      if (colElForLive) {
        colElForLive.addEventListener('change', () => applyLiveUpdate(type));
        colElForLive.addEventListener('input', () => applyLiveUpdate(type));
      }
    }

    /**
     * 共通フィールド（位置・変形・塗り）の値を選択中オブジェクトに即時反映する。
     * 「この内容で設定する」ボタンを押さなくても変更がオブジェクトに適用される。
     * @param {string} type - アノテーション種別
     */
    function applyLiveUpdate(type) {

      const allTargets = getSelectedObjects();
      if (allTargets.length === 0) return;

      // Undo用: 変更前スナップショットを積む（初回または値が変わる直前のみ）
      if (!applyLiveUpdate._undoPushed) {
        // 単一選択時は1件、複数選択時は全件
        const snapshots = allTargets.map(target => ({
          el: target,
          prevStyleCssText: target.style.cssText,
          prevClassName: target.className,
          prevSavedData: target.dataset.savedData,
          prevInnerHTML: target.innerHTML
        }));
        pushUndo({ type: 'prop', targets: snapshots });
        applyLiveUpdate._undoPushed = true;
      }


      const x = parseFloat(document.getElementById('annPosX')?.value)  ?? 0;
      const y = parseFloat(document.getElementById('annPosY')?.value)  ?? 0;
      const w = parseFloat(document.getElementById('annWidth')?.value)  || 0;
      const h = parseFloat(document.getElementById('annHeight')?.value) || 0;
      const colorIdx = parseInt(document.getElementById('annColor')?.value || '0', 10);

      // ボタン系要素（答/大問/証明ボタン）か判定するヘルパー
      const isButtonEl = el => el.classList.contains('daimon-btn') ||
                                el.classList.contains('kotae-btn') ||
                                el.classList.contains('shomei-btn');

      if (allTargets.length === 1) {
        // 単一選択：絶対値で位置・サイズ・色を適用
        const target = allTargets[0];
        target.style.left = x + 'px';
        target.style.top  = y + 'px';
        if (isButtonEl(target)) {
          // ボタン系：位置のみ変更、背景・サイズは変更しない
        } else if (type === 'sticky') {
          const color = STICKY_COLOR_MAP[colorIdx] ?? STICKY_COLOR_MAP[0];
          if (w > 0) target.style.width  = w + 'px';
          if (h > 0) target.style.height = h + 'px';
          target.style.background = color;
        } else if (target.classList.contains('pagejump-obj')) {
          // ページ遷移オブジェクト：背景は常に透明り、サイズのみ変更
          if (w > 0) target.style.width  = w + 'px';
          if (h > 0) target.style.height = h + 'px';
        } else if (!target.classList.contains('ann-icon-obj')) {
          const bgColor = ANN_COLOR_OPTIONS[colorIdx]?.value ?? '#aaa';
          if (w > 0) target.style.width  = w + 'px';
          if (h > 0) target.style.height = h + 'px';
          target.style.background = bgColor;
        }
      } else {
        // 複数選択：位置・サイズはデルタで全対象に適用し個々の状態を保持、塗り色は絶対値で適用
        const prevX = applyLiveUpdate._prevX ?? x;
        const prevY = applyLiveUpdate._prevY ?? y;
        const prevW = applyLiveUpdate._prevW ?? w;
        const prevH = applyLiveUpdate._prevH ?? h;
        const dx = x - prevX;
        const dy = y - prevY;
        const dw = w - prevW;
        const dh = h - prevH;

        allTargets.forEach(target => {
          // 位置をデルタ分移動
          if (dx !== 0) target.style.left = (parseFloat(target.style.left) || 0) + dx + 'px';
          if (dy !== 0) target.style.top  = (parseFloat(target.style.top)  || 0) + dy + 'px';

          if (isButtonEl(target)) {
            // ボタン系：位置のみ変更、サイズ・背景は変更しない
            return;
          }
          const isSticky = target.classList.contains('sticky-note');
          if (isSticky) {
            // 付箋：サイズをデルタ分変更（最小10px）、塗り色は絶対値適用
            const color = STICKY_COLOR_MAP[colorIdx] ?? STICKY_COLOR_MAP[0];
            if (dw !== 0) target.style.width  = Math.max(10, (parseFloat(target.style.width)  || 0) + dw) + 'px';
            if (dh !== 0) target.style.height = Math.max(10, (parseFloat(target.style.height) || 0) + dh) + 'px';
            target.style.background = color;
          } else if (target.classList.contains('pagejump-obj')) {
            // ページ遷移オブジェクト：背景は常に透明、サイズのみデルタ分変更
            if (dw !== 0) target.style.width  = Math.max(10, (parseFloat(target.style.width)  || 0) + dw) + 'px';
            if (dh !== 0) target.style.height = Math.max(10, (parseFloat(target.style.height) || 0) + dh) + 'px';
          } else if (!target.classList.contains('ann-icon-obj')) {
            // マーカー型：サイズをデルタ分変更（最小10px）、塗り色は絶対値適用
            const bgColor = ANN_COLOR_OPTIONS[colorIdx]?.value ?? '#aaa';
            if (dw !== 0) target.style.width  = Math.max(10, (parseFloat(target.style.width)  || 0) + dw) + 'px';
            if (dh !== 0) target.style.height = Math.max(10, (parseFloat(target.style.height) || 0) + dh) + 'px';
            target.style.background = bgColor;
          }
        });

        // バウンディングボックスを再描画
        updateAlignPanel();
      }
      // 次回デルタ計算のために現在値を保持
      applyLiveUpdate._prevX = x;
      applyLiveUpdate._prevY = y;
      applyLiveUpdate._prevW = w;
      applyLiveUpdate._prevH = h;
      // 入力確定時にUndo積み直しを許可
      setTimeout(() => { applyLiveUpdate._undoPushed = false; }, 0);
    }

    /**
     * 種別固有フィールド（表示タイプ・種別設定）を指定フォームに生成する。
     * @param {HTMLElement} form      - 追加先の dl 要素
     * @param {string}      type      - アノテーション種別
     * @param {object}      savedData - 保存済みデータ
     */
    function buildSpecificFields(form, type, savedData) {
      const cfg      = ANNOTATION_TYPE_CONFIG[type];
      const dispType = savedData.annDisplayType || 'marker';

      if (type === 'sticky') {
        // 付箋固有：フィールドなし（内容入力は不要）
        return;
      }

      if (type === 'pagejump') {
        // ページ遷移固有：遷移先ページ番号のみ入力（表示タイプ選択なし）
        const dt = document.createElement('dt');
        dt.textContent = '遷移先ページ';
        form.appendChild(dt);
        const dd = document.createElement('dd');
        dd.innerHTML = `<div style="display:flex; align-items:center; gap:6px;">
          <input type="number" class="d-input d-input-sm" id="annTarget" min="1"
            value="${savedData.annTarget || ''}" placeholder="1">
          <span style="font-size:12px; color:#555;">ページ目</span>
        </div>`;
        form.appendChild(dd);
        return;
      }

      // --- 表示タイプ（非sticky共通） ---
      const dtDt = document.createElement('dt');
      dtDt.textContent = '表示タイプ';
      form.appendChild(dtDt);
      const dtDd = document.createElement('dd');
      const isPagelink = type === 'pagelink';
      dtDd.innerHTML = `
        <div class="disp-type-row">
          <label class="disp-type-option${dispType === 'icon' ? ' is-active' : ''}" id="dtOpt-icon">
            <div class="disp-type-top">
              <input type="radio" name="annDisplayTypeRadio" value="icon"${dispType === 'icon' ? ' checked' : ''}>
              <div class="disp-type-preview disp-type-preview--icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">${cfg.iconSvg}</svg>
              </div>
            </div>
            <span class="disp-type-label">アイコン</span>
          </label>
          <label class="disp-type-option${dispType === 'marker' ? ' is-active' : ''}" id="dtOpt-marker">
            <div class="disp-type-top">
              <input type="radio" name="annDisplayTypeRadio" value="marker"${dispType === 'marker' ? ' checked' : ''}>
              <div class="disp-type-preview disp-type-preview--marker">テキスト</div>
            </div>
            <span class="disp-type-label">マーカー</span>
          </label>
          ${isPagelink ? `
          <label class="disp-type-option${dispType === 'white-area' ? ' is-active' : ''}" id="dtOpt-white-area">
            <div class="disp-type-top">
              <input type="radio" name="annDisplayTypeRadio" value="white-area"${dispType === 'white-area' ? ' checked' : ''}>
              <div class="disp-type-preview disp-type-preview--white-area"></div>
            </div>
            <span class="disp-type-label">透明</span>
          </label>` : ''}
        </div>
        <input type="hidden" id="annDisplayType" value="${dispType}">
      `;
      dtDd.querySelectorAll('input[name="annDisplayTypeRadio"]').forEach(radio => {
        radio.addEventListener('change', () => {
          const v = radio.value;
          // dtDd スコープで検索することでポップアップとサイドバーの ID 競合を防ぐ
          dtDd.querySelector('#annDisplayType').value = v;
          dtDd.querySelector('#dtOpt-icon').classList.toggle('is-active',   v === 'icon');
          dtDd.querySelector('#dtOpt-marker').classList.toggle('is-active', v === 'marker');
          const waOpt = dtDd.querySelector('#dtOpt-white-area');
          if (waOpt) waOpt.classList.toggle('is-active', v === 'white-area');
          // 透明選択時は塗り色フィールドを非活性化
          const colorRoot = form.closest('.dialog-contents') || document.getElementById('sideDetailCommonWrap');
          if (colorRoot) {
            colorRoot.querySelectorAll('[data-field-group="fill"]').forEach(el => {
              el.classList.toggle('is-field-disabled', v === 'white-area');
              const sel = el.querySelector('select');
              if (sel) sel.disabled = (v === 'white-area');
            });
          }
        });
      });
      form.appendChild(dtDd);

      // --- 種別固有フィールド ---
      if (type === 'pagelink') {
        const dt = document.createElement('dt');
        dt.textContent = 'リンク先';
        form.appendChild(dt);
        const dd = document.createElement('dd');
        dd.innerHTML = `
          <div style="display:flex; align-items:center; gap:6px;">
            <input type="number" class="d-input d-input-sm" id="annTarget" min="1"
              value="${savedData.annTarget || ''}" placeholder="0">
            <span style="font-size:12px; color:#555;">ページ目</span>
          </div>
          <p class="field-note">※目次を兼ねたページを指定してください。</p>`;
        form.appendChild(dd);

      } else if (type === 'plusfile') {
        const showMode = savedData.annShowMode || '0';
        form.appendChild(_buildRadioDt('表示方法'));
        form.appendChild(_buildRadioDD('annShowMode', 'annShowModeRadio', showMode, [
          { value: '0', label: 'ページ内' },
          { value: '1', label: '別タブ' },
        ]));
        form.appendChild(_buildTextDt('ディレクトリ名'));
        form.appendChild(_buildTextDD('annFile', savedData.annFile || '', ''));

      } else if (type === 'externallink') {
        const showMode = savedData.annShowMode || '0';
        form.appendChild(_buildRadioDt('表示方法'));
        form.appendChild(_buildRadioDD('annShowMode', 'annShowModeRadio', showMode, [
          { value: '0', label: 'ページ内' },
          { value: '1', label: '別タブ' },
        ]));
        form.appendChild(_buildTextDt('リンク先URL'));
        form.appendChild(_buildTextDD('annUrl', savedData.annUrl || '', 'https://...'));

      } else if (type === 'audio') {
        form.appendChild(_buildTextDt('ファイル名'));
        const fileDd = _buildTextDD('annFile', savedData.annFile || '', 'ファイル名を入力');
        fileDd.querySelector('input').insertAdjacentHTML('afterend',
          '<p class="field-note">※ファイル名の拡張子「.mp3」は除く</p>');
        form.appendChild(fileDd);
        const playMode = savedData.annPlayMode || '0';
        form.appendChild(_buildRadioDt('再生方法'));
        form.appendChild(_buildRadioDD('annPlayMode', 'annPlayModeRadio', playMode, [
          { value: '0', label: 'コントローラーあり' },
          { value: '1', label: 'コントローラーなし' },
        ]));

      } else if (type === 'video') {
        const videoSrc = savedData.annVideoSrc || '0';
        form.appendChild(_buildRadioDt('動画ファイル'));
        form.appendChild(_buildRadioDD('annVideoSrc', 'annVideoSrcRadio', videoSrc, [
          { value: '0', label: '内部ファイル' },
          { value: '1', label: '外部動画をタグで追加' },
        ]));
        form.appendChild(_buildTextDt('ファイル名'));
        const fileDd = _buildTextDD('annFile', savedData.annFile || '', 'ファイル名を入力');
        fileDd.querySelector('input').insertAdjacentHTML('afterend',
          '<p class="field-note">※ファイル名の拡張子「.mp4」は除く</p>');
        form.appendChild(fileDd);
        const showMode = savedData.annShowMode || '0';
        form.appendChild(_buildRadioDt('表示方法'));
        form.appendChild(_buildRadioDD('annShowMode', 'annShowModeRadio', showMode, [
          { value: '0', label: 'ページ内' },
          { value: '1', label: '別タブ' },
        ]));

      } else if (type === 'kotae') {
        // B-1: 答ボタン固有：ボタンラベル選択セレクトボックスを追加
        const labelOptions = cfg.labelOptions || ['答', '解答', '答え', 'Answer', '確認'];
        const currentLabel = savedData.kotaeLabel || labelOptions[0];
        const labelDt = document.createElement('dt');
        labelDt.textContent = 'ボタンラベル';
        form.appendChild(labelDt);
        const labelDd = document.createElement('dd');
        const optionsHtml = labelOptions.map(v =>
          `<option value="${v}"${v === currentLabel ? ' selected' : ''}>${v}</option>`
        ).join('');
        labelDd.innerHTML = `<div class="d-select-wrap">
          <select class="d-select" id="kotaeLabelSelect">${optionsHtml}</select>
        </div>`;
        // 選択変更時にボタンの表示テキストへ即時反映
        labelDd.querySelector('#kotaeLabelSelect').addEventListener('change', (e) => {
          if (window._currentKotaeEl) window._currentKotaeEl.textContent = e.target.value;
        });
        form.appendChild(labelDd);
      }
    }

    /**
     * @deprecated buildCommonFields + buildSpecificFields に分割済み。後方互換のため残存。
     * アノテーション設定フォームフィールドを dl 要素に生成する（旧実装）。
     */
    function buildAnnDialogFields(form, type, savedData, initRect) {
      buildCommonFields(form, type, savedData, initRect);
      buildSpecificFields(form, type, savedData);
    }

    /** DL用 dt 要素を生成するヘルパー */
    function _buildRadioDt(label) {
      const dt = document.createElement('dt');
      dt.textContent = label;
      return dt;
    }
    function _buildTextDt(label) {
      const dt = document.createElement('dt');
      dt.textContent = label;
      return dt;
    }

    /**
     * ラジオボタン dd 要素を生成し、hidden input を連動させるヘルパー。
     * @param {string} hiddenId   - hidden input の id
     * @param {string} radioName  - radio の name 属性
     * @param {string} currentVal - 現在の選択値
     * @param {Array}  items      - [{value, label}, ...]
     */
    function _buildRadioDD(hiddenId, radioName, currentVal, items) {
      const dd = document.createElement('dd');
      const radiosHtml = items.map(it =>
        `<label><input type="radio" name="${radioName}" value="${it.value}"${currentVal === it.value ? ' checked' : ''}> ${it.label}</label>`
      ).join('');
      dd.innerHTML = `<div class="radio-row">${radiosHtml}</div><input type="hidden" id="${hiddenId}" value="${currentVal}">`;
      dd.querySelectorAll(`input[name="${radioName}"]`).forEach(r => {
        r.addEventListener('change', () => { document.getElementById(hiddenId).value = r.value; });
      });
      return dd;
    }

    /**
     * テキスト入力 dd 要素を生成するヘルパー。
     * @param {string} id          - input の id
     * @param {string} value       - 初期値
     * @param {string} placeholder - プレースホルダー
     */
    function _buildTextDD(id, value, placeholder) {
      const dd = document.createElement('dd');
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'd-input';
      inp.id = id;
      inp.value = value;
      inp.placeholder = placeholder;
      dd.appendChild(inp);
      return dd;
    }

    /**
     * アノテーション設定ダイアログを開く。
     * アノテーション設定ダイアログを開く。
     * 全種別共通：dialogConfigs からフィールドを生成する。
     * @param {string} type
     * @param {HTMLElement|null} existingEl - 再設定対象要素（新規作成時は null）
     */
    function openAnnotationSettingsDialog(type, existingEl = null) {
      lastDetailType = type;  // 最後に表示した種別を履歴保持
      // B-1: 答ボタン編集時に対象要素を保持（ラベル即時反映用）
      window._currentKotaeEl = (type === 'kotae' && existingEl) ? existingEl : null;
      // デルタ計算の基準値をリセット（新たな選択に備える）
      applyLiveUpdate._prevX = undefined;
      applyLiveUpdate._prevY = undefined;
      applyLiveUpdate._prevW = undefined;
      applyLiveUpdate._prevH = undefined;
      const cfg = ANNOTATION_TYPE_CONFIG[type];
      document.getElementById('dialogTitle').textContent = cfg.label + '設定';

      // --- 共通セクション（位置・サイズ・塗り色）を再構築 ---
      const commonForm = document.getElementById('dialogFormCommon');
      commonForm.innerHTML = '';

      // --- 種別固有セクションを再構築 ---
      const specificForm = document.getElementById('dialogFormSpecific');
      specificForm.innerHTML = '';

      // savedData の収集（既存要素 or 連続作成引継ぎ）
      let savedData = {};
      if (existingEl?.dataset.savedData) {
        try { savedData = JSON.parse(existingEl.dataset.savedData); } catch (_) {}
      } else if (lastNewAnnData[type]) {
        savedData = { ...lastNewAnnData[type] };
      }
      // 既存要素の場合は style から位置・サイズを上書き（ドラッグ移動後も正確に取得）
      if (existingEl) {
        savedData.annPosX   = parseInt(existingEl.style.left,   10) || 0;
        savedData.annPosY   = parseInt(existingEl.style.top,    10) || 0;
        if (existingEl.style.width)  savedData.annWidth  = parseInt(existingEl.style.width,  10) || 100;
        if (existingEl.style.height) savedData.annHeight = parseInt(existingEl.style.height, 10) || 100;
      }
      // 新規作成時は pendingRect を初期値として使用
      const initRect = existingEl ? null : pendingRect;

      // 共通フィールドを生成（常時表示）
      buildCommonFields(commonForm, type, savedData, initRect);

      // アイコン型オブジェクト選択時は変形・塗りフィールドをグレーアウト
      const isIconObj  = existingEl?.classList.contains('ann-icon-obj');
      // ページ遷移オブジェクト・透明ページリンク選択時は塗りフィールドをグレーアウト
      const isPagejump = type === 'pagejump';
      const savedDtForCheck = (() => { try { return JSON.parse(existingEl?.dataset?.savedData || '{}'); } catch { return {}; } })();
      const isWhiteArea = type === 'pagelink' && savedDtForCheck.annDisplayType === 'white-area';
      commonForm.querySelectorAll('[data-field-group="transform"]').forEach(el => {
        el.classList.toggle('is-field-disabled', !!isIconObj);
      });
      commonForm.querySelectorAll('[data-field-group="fill"]').forEach(el => {
        el.classList.toggle('is-field-disabled', !!isIconObj || isPagejump || isWhiteArea);
        const sel = el.querySelector('select');
        if (sel) sel.disabled = !!isIconObj || isPagejump || isWhiteArea;
      });

      // 種別固有フィールドを生成（サイドバーでは非表示だが confirmAnnotation が読み取るため常に生成）
      buildSpecificFields(specificForm, type, savedData);

      // 種別固有セクションはサイドメニューでは常に非表示（ダブルクリック編集ポップアップで編集する）
      const sepEl      = document.getElementById('detailSectionSep');
      const specificEl = document.getElementById('sideDetailSpecificWrap');
      sepEl.style.display      = 'none';
      specificEl.style.display = 'none';

      // ダイアログ削除ボタンは常に非表示（削除はDeleteキーで行う）
      const dialogDeleteBtn = document.querySelector('.dialog-btn.delete-btn');
      dialogDeleteBtn.style.display = 'none';
      dialogDeleteBtn.onclick = null;

      // キャンセルボタン
      document.querySelector('.dialog-btn.cancel').onclick = () => {
        if (!existingEl) { pendingRect = null; deactivateAnnotationMode(); }
        closeDialog();
        document.querySelector('.dialog-btn.ok').onclick = saveDialog;
        updateStatus('キャンセルしました');
      };

      // 保存
      document.querySelector('.dialog-btn.ok').onclick = () => confirmAnnotation(type, existingEl);

      document.getElementById('sideDetailEmpty').style.visibility = 'hidden';
      document.getElementById('sideDetailActive').style.display = '';
    }

    /**
     * アノテーションをページに確定配置する、または既存要素を更新する。
     * @param {string} type
     * @param {HTMLElement|null} existingEl - 更新対象要素（新規作成時は null）
     */
    function confirmAnnotation(type, existingEl = null, overrideSavedData = null) {
      // 新規作成時は pendingRect が必要
      if (!existingEl && !pendingRect) { closeDialog(); return; }

      const isUpdate = existingEl !== null;

      // フォームフィールド値を一括収集
      // overrideSavedDataがあればそれを優先、なければサイドバーのフォームから取得
      let savedData = {};
      if (overrideSavedData) {
        savedData = overrideSavedData;
      } else {
        ['dialogFormCommon', 'dialogFormSpecific'].forEach(formId => {
          const formEl = document.getElementById(formId);
          if (!formEl) return;
          formEl.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
            savedData[el.id] = el.value;
          });
        });
      }

      if (type === 'sticky') {
        // 色変換
        const colorIdx = parseInt(savedData.annColor || '0', 10);
        const color    = STICKY_COLOR_MAP[colorIdx] ?? STICKY_COLOR_MAP[0];

        if (isUpdate) {
          // 更新前のスナップショットを Undo スタックに積む（ラベルやクラス名も含める）
          pushUndo({
            type: 'prop',
            el: existingEl,
            prevSavedData: existingEl.dataset.savedData,
            prevStyleCssText: existingEl.style.cssText,
            prevClassName: existingEl.className,
            prevInnerHTML: existingEl.innerHTML
          });
          // 位置・サイズ・色を反映
          if (savedData.annPosX !== undefined) existingEl.style.left = parseInt(savedData.annPosX, 10) + 'px';
          if (savedData.annPosY !== undefined) existingEl.style.top  = parseInt(savedData.annPosY, 10) + 'px';
          if (savedData.annWidth !== undefined)  existingEl.style.width  = parseInt(savedData.annWidth, 10) + 'px';
          if (savedData.annHeight !== undefined) existingEl.style.height = parseInt(savedData.annHeight, 10) + 'px';
          existingEl.style.background = color;
          // ラベル（annLabel）があれば反映
          if (savedData.annLabel !== undefined) {
            let labelSpan = existingEl.querySelector('.ann-label');
            if (!labelSpan) {
              labelSpan = document.createElement('span');
              labelSpan.className = 'ann-label';
              existingEl.appendChild(labelSpan);
            }
            labelSpan.textContent = savedData.annLabel;
          }
          existingEl.dataset.savedData = JSON.stringify(savedData);
          updateStatus('付箋を更新しました');
        } else {
          // 新規作成：連続作成用に設定を保存
          lastNewAnnData[type] = savedData;
          const { x, y, w, h } = pendingRect;
          const note = document.createElement('div');
          note.className = 'sticky-note state-visible';
          note.dataset.id        = ++annIdCounter;
          note.dataset.type      = 'sticky';
          note.dataset.savedData = JSON.stringify(savedData);
          note.style.cssText = `left:${x}px; top:${y}px; width:${w}px; height:${h}px; background:${color};`;

          // クリックハンドラを設定（コピー時の再利用のため関数化）
          addStickyClickHandler(note);

          makeDraggable(note);
          makeResizable(note);
          note.dataset.page = currentPage;
          document.getElementById('pageLeft').appendChild(note);
          pushUndo({ type: 'create', elements: [note] });
          updateStatus('付箋を配置しました（クリックで解答の表示/非表示）');
        }

      } else if (type === 'pagejump') {
        // --- ページ遷移オブジェクト（透明矩形）を作成 ---
        if (!isUpdate) {
          lastNewAnnData[type] = savedData;
          const { x, y, w, h } = pendingRect;
          const obj = document.createElement('div');
          obj.className     = 'pagejump-obj';
          obj.dataset.id    = ++annIdCounter;
          obj.dataset.type  = 'pagejump';
          obj.dataset.savedData = JSON.stringify(savedData);
          obj.style.cssText = `left:${x}px; top:${y}px; width:${w}px; height:${h}px;`;
          addPagejumpObjHandler(obj);
          makeDraggable(obj);
          makeResizable(obj);
          obj.dataset.page = currentPage;
          document.getElementById('pageLeft').appendChild(obj);
          pushUndo({ type: 'create', elements: [obj] });
          updateStatus('ページ遷移オブジェクトを配置しました（閲覧モードでクリックするとページ遷移します）');
        } else {
          // 更新：位置・サイズ・savedData を反映
          pushUndo({ type: 'prop', el: existingEl, prevSavedData: existingEl.dataset.savedData, prevStyleCssText: existingEl.style.cssText });
          if (savedData.annPosX  !== undefined) existingEl.style.left   = parseInt(savedData.annPosX,  10) + 'px';
          if (savedData.annPosY  !== undefined) existingEl.style.top    = parseInt(savedData.annPosY,  10) + 'px';
          if (savedData.annWidth !== undefined) existingEl.style.width  = parseInt(savedData.annWidth, 10) + 'px';
          if (savedData.annHeight!== undefined) existingEl.style.height = parseInt(savedData.annHeight,10) + 'px';
          existingEl.dataset.savedData = JSON.stringify(savedData);
          updateStatus('ページ遷移オブジェクトを更新しました');
        }

      } else {
        // --- 汎用アノテーション（ページリンク / Plusファイル / 外部リンク / 音声再生 / 動画再生） ---
        const cfg         = ANNOTATION_TYPE_CONFIG[type];
        const displayType = savedData.annDisplayType || 'marker';
        const colorIdx    = parseInt(savedData.annColor || '0', 10);
        const bgColor     = ANN_COLOR_OPTIONS[colorIdx]?.value ?? cfg.color;
        // 新規作成時は pendingRect のドラッグ寸法を優先し、更新時はフォーム値を使用する
        const x = isUpdate ? (parseFloat(savedData.annPosX)   || 0)   : (pendingRect?.x ?? parseFloat(savedData.annPosX)   ?? 0);
        const y = isUpdate ? (parseFloat(savedData.annPosY)   || 0)   : (pendingRect?.y ?? parseFloat(savedData.annPosY)   ?? 0);
        const w = isUpdate ? (parseFloat(savedData.annWidth)  || 100) : (pendingRect?.w ?? parseFloat(savedData.annWidth)  ?? 100);
        const h = isUpdate ? (parseFloat(savedData.annHeight) || 100) : (pendingRect?.h ?? parseFloat(savedData.annHeight) ?? 100);
        const label = (savedData.annLabel || '').trim() || cfg.label;

        if (isUpdate) {
          // 更新前のスナップショットを Undo スタックに積む
          pushUndo({ type: 'prop', el: existingEl, prevSavedData: existingEl.dataset.savedData, prevStyleCssText: existingEl.style.cssText, prevClassName: existingEl.className, prevInnerHTML: existingEl.innerHTML });
          // 更新：表示タイプの変更にも対応する
          existingEl.style.left = x + 'px';
          existingEl.style.top  = y + 'px';
          existingEl.dataset.savedData = JSON.stringify(savedData);

          if (displayType === 'icon') {
            // アイコン型に変更または絶対アイコン型のまま更新
            existingEl.className = 'ann-icon-obj';
            existingEl.style.width  = '';
            existingEl.style.height = '';
            existingEl.style.background = '';
            existingEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">${cfg.iconSvg}</svg>`;
          } else if (displayType === 'white-area') {
            // 透明（紙面色白）型に変更または更新
            existingEl.className = 'ann-object dt-white-area';
            existingEl.style.width      = w + 'px';
            existingEl.style.height     = h + 'px';
            existingEl.style.background = '';
            existingEl.innerHTML = '';
          } else {
            // マーカー型に変更または絶対マーカー型のまま更新
            existingEl.className = 'ann-object';
            existingEl.style.width      = w + 'px';
            existingEl.style.height     = h + 'px';
            existingEl.style.background = bgColor;
            let span = existingEl.querySelector('.ann-label');
            if (!span) {
              span = document.createElement('span');
              span.className = 'ann-label';
              existingEl.innerHTML = '';
              existingEl.appendChild(span);
            }
            span.textContent = label;
          }
          updateStatus(`${cfg.label}を更新しました`);
        } else {
          // 新規作成：連続作成用に設定を保存し、displayType に応じて要素を生成
          lastNewAnnData[type] = savedData;
          const ann = document.createElement('div');
          ann.dataset.id        = ++annIdCounter;
          ann.dataset.type      = type;
          ann.dataset.savedData = JSON.stringify(savedData);

          if (displayType === 'icon') {
            // アイコン型：円形ボタン
            ann.className = 'ann-icon-obj';
            ann.style.cssText = `left:${x}px; top:${y}px;`;
            ann.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">${cfg.iconSvg}</svg>`;
          } else if (displayType === 'white-area') {
            // 透明（紙面色白）型：透明矩形ホットスポット
            ann.className = 'ann-object dt-white-area';
            ann.style.cssText = `left:${x}px; top:${y}px; width:${w}px; height:${h}px;`;
          } else {
            // マーカー型：矩形ラベル
            ann.className = 'ann-object';
            ann.style.cssText = `left:${x}px; top:${y}px; width:${w}px; height:${h}px; background:${bgColor};`;
            const labelSpan = document.createElement('span');
            labelSpan.className   = 'ann-label';
            labelSpan.textContent = label;
            ann.appendChild(labelSpan);
          }

          // クリックハンドラを設定（コピー時の再利用のため関数化）
          addAnnClickHandler(ann);

          makeDraggable(ann);
          if (displayType !== 'icon') makeResizable(ann);
          ann.dataset.page = currentPage;
          document.getElementById('pageLeft').appendChild(ann);
          pushUndo({ type: 'create', elements: [ann] });
          const dispLabel = displayType === 'icon' ? 'アイコン' : displayType === 'white-area' ? '透明' : 'マーカー';
          updateStatus(`${cfg.label}を配置しました（${dispLabel}型）`);
        }
      }

      if (!isUpdate) pendingRect = null;
      // 連続作成モード（新規作成）：設定フォームを再表示して次のドラッグに備える
      if (!isUpdate && currentDrawType) {
        openAnnotationSettingsDialog(currentDrawType);
      } else {
        closeDialog();
        document.querySelector('.dialog-btn.ok').onclick = saveDialog;
      }
    }

    /**
     * 要素をドラッグ可能にする。
     * @param {HTMLElement} el
     * @param {string} excludeSelector - ドラッグを除外する子要素セレクタ
     */
    /**
     * 付箋要素にクリックハンドラを設定する。
     * コピー（Alt+ドラッグ）時のクローン再初期化でも使用する。
     * @param {HTMLElement} note - 付箋要素
     */
    function addStickyClickHandler(note) {
            // ダブルクリック：編集モード時に編集ポップアップを開く
            note.addEventListener('dblclick', (e) => {
              if (document.body.classList.contains('is-view-mode')) return;
              e.preventDefault();
              e.stopPropagation();
              openEditPopup(note);
            });
      note.addEventListener('click', (e) => {
        // 編集モード時
        if (!document.body.classList.contains('is-view-mode')) {
          if (e.shiftKey) {
            if (selectedStickySet.has(note)) {
              selectedStickySet.delete(note);
              note.classList.remove('is-selected');
              if (selectedStickySet.size === 0) closeDialog();
            } else {
              selectedStickySet.add(note);
              note.classList.add('is-selected');
              openAnnotationSettingsDialog('sticky', note);
            }
            updateStatus(`付箋を ${selectedStickySet.size} 件選択中`);
          } else {
            const multiCount = selectedStickySet.size
              + document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected').length;
            if (multiCount > 1 && selectedStickySet.has(note)) {
              // 複数選択中に選択済み付箋をクリック：他の選択を解除してこの付箋のみ選択
              selectedStickySet.forEach(n => n.classList.remove('is-selected'));
              selectedStickySet.clear();
              document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected').forEach(a => a.classList.remove('is-selected'));
              selectedStickySet.add(note);
              note.classList.add('is-selected');
              openAnnotationSettingsDialog('sticky', note);
              updateStatus('付箋を選択中');
            } else {
              // 未選択オブジェクトクリック：全解除してこの付箋のみ選択
              selectedStickySet.forEach(n => n.classList.remove('is-selected'));
              selectedStickySet.clear();
              document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected').forEach(a => a.classList.remove('is-selected'));
              selectedStickySet.add(note);
              note.classList.add('is-selected');
              openAnnotationSettingsDialog('sticky', note);
              updateStatus('付箋を選択中');
            }
          }
          return;
        }
        // 閲覧モード時
        // 証明ボタン管理の付箋：直接クリックで白表示⇔赤枠線のみをトグル
        if (note.dataset.shomeiId) {
          if (note.dataset.shomeiOutline === '1') {
            // 赤枠線状態 → 白で表示
            note.style.background = '#ffffff';
            note.style.outline = '';
            delete note.dataset.shomeiOutline;
            updateStatus('証明を表示しました');
          } else {
            // 白表示中 → 赤枠線のみ表示
            note.style.background = 'transparent';
            note.style.outline = '2px solid rgb(255,0,0)';
            note.dataset.shomeiOutline = '1';
            updateStatus('証明を非表示にしました');
          }
          return;
        }

        const isFuhyoji = note.dataset.fuhyoji === '1';
        if (isFuhyoji) {
          // 「付箋非表示」設定済み：表示状態のときは反応しない。非表示のときのみ表示する。
          if (note.classList.contains('state-visible')) return;
          const gid = note.dataset.groupId;
          const targets = gid
            ? Array.from(document.querySelectorAll(`.sticky-note[data-group-id="${gid}"]`))
            : [note];
          targets.forEach(t => {
            if (!t.classList.contains('state-hidden')) return;
            t.classList.remove('state-hidden');
            t.classList.add('state-visible');
          });
          updateStatus('解答を表示しました');
        } else {
          // 通常付箋：トグル（即時）
          const isVisible = note.classList.contains('state-visible');
          const gid = note.dataset.groupId;
          const targets = gid
            ? Array.from(document.querySelectorAll(`.sticky-note[data-group-id="${gid}"]`))
            : [note];
          targets.forEach(t => {
            t.classList.toggle('state-visible', !isVisible);
            t.classList.toggle('state-hidden',   isVisible);
          });
          updateStatus(isVisible ? '解答を隠しました' : '解答を表示しました');
        }
      });
    }

    /**
     * ページ遷移オブジェクトにクリックハンドラを設定する。
     * 閲覧モード：クリックで指定ページへ遷移。
