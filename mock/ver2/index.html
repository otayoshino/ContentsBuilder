     * 編集モード：クリックで選択、ダブルクリックで編集ポップアップを開く。
     * @param {HTMLElement} el - pagejump-obj 要素
     */
    function addPagejumpObjHandler(el) {
      // ダブルクリック：編集モード時に編集ポップアップを開く
      el.addEventListener('dblclick', (e) => {
        if (document.body.classList.contains('is-view-mode')) return;
        e.preventDefault();
        e.stopPropagation();
        openEditPopup(el);
      });

      el.addEventListener('click', (e) => {
        // 閲覧モード：指定ページへ移動
        if (document.body.classList.contains('is-view-mode')) {
          e.stopPropagation();
          try {
            const sd = JSON.parse(el.dataset.savedData || '{}');
            const target = parseInt(sd.annTarget, 10);
            if (target >= 1 && target <= totalPages) {
              currentPage = target;
              updatePageDisplay();
              updateStatus(`ページ ${target} へ移動しました`);
            } else {
              updateStatus('遷移先ページが設定されていません');
            }
          } catch (_) {}
          return;
        }

        // 編集モード：オブジェクトを選択
        e.stopPropagation();
        if (e.shiftKey) {
          if (el.classList.contains('is-selected')) {
            el.classList.remove('is-selected');
            const remaining = document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .pagejump-obj.is-selected');
            if (remaining.length === 0 && selectedStickySet.size === 0) closeDialog();
          } else {
            el.classList.add('is-selected');
            openAnnotationSettingsDialog('pagejump', el);
          }
          const count = document.querySelectorAll(
            '.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, ' +
            '.kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected'
          ).length + selectedStickySet.size;
          updateStatus(`${count} 件のオブジェクトを選択中`);
        } else {
          selectedStickySet.forEach(n => n.classList.remove('is-selected'));
          selectedStickySet.clear();
          document.querySelectorAll(
            '.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, ' +
            '.kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected'
          ).forEach(a => a.classList.remove('is-selected'));
          el.classList.add('is-selected');
          openAnnotationSettingsDialog('pagejump', el);
          updateStatus('ページ遷移オブジェクトを選択中');
        }
      });
    }

    /**
     * アノテーション要素にクリックハンドラを設定する。
     * コピー（Alt+ドラッグ）時のクローン再初期化でも使用する。
     * @param {HTMLElement} ann - アノテーション要素
     */
    function addAnnClickHandler(ann) {
      const type = ann.dataset.type;
      const cfg  = ANNOTATION_TYPE_CONFIG[type];
      ann.addEventListener('click', (e) => {
        // 閲覧モード時：実際の挙動を実行
        if (document.body.classList.contains('is-view-mode')) {
          fireAnnotationAction(ann);
          return;
        }
        if (e.shiftKey) {
          // Shift+クリック：複数選択トグル（付箋との混在も維持）
          if (ann.classList.contains('is-selected')) {
            ann.classList.remove('is-selected');
            const remaining = document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected');
            if (remaining.length === 0 && selectedStickySet.size === 0) closeDialog();
          } else {
            ann.classList.add('is-selected');
            openAnnotationSettingsDialog(type, ann);
          }
          const count = document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected').length
                      + selectedStickySet.size;
          updateStatus(`${count} 件のオブジェクトを選択中`);
        } else {
          const multiCount = selectedStickySet.size
            + document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected').length;
          if (multiCount > 1 && ann.classList.contains('is-selected')) {
            // 複数選択中に選択済みオブジェクトをクリック：他の選択を解除してこの要素のみ選択
            selectedStickySet.forEach(n => n.classList.remove('is-selected'));
            selectedStickySet.clear();
            document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected').forEach(a => a.classList.remove('is-selected'));
            ann.classList.add('is-selected');
            openAnnotationSettingsDialog(type, ann);
            updateStatus(`${cfg?.label ?? type}を選択中`);
          } else {
            // 未選択オブジェクトクリック：全解除してこの要素のみ選択
            selectedStickySet.forEach(n => n.classList.remove('is-selected'));
            selectedStickySet.clear();
            document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected').forEach(a => a.classList.remove('is-selected'));
            ann.classList.add('is-selected');
            openAnnotationSettingsDialog(type, ann);
            updateStatus(`${cfg?.label ?? type}を選択中`);
          }
        }
      });

      // ダブルクリック：編集モード時に編集ポップアップを開く
      ann.addEventListener('dblclick', (e) => {
        if (document.body.classList.contains('is-view-mode')) return;
        e.preventDefault();
        e.stopPropagation();
        openEditPopup(ann);
      });
    }

    /**
     * 選択時に四隅リサイズハンドルを追加し、ドラッグでサイズ変更できるようにする。
     * アイコン型（.ann-icon-obj）には適用しない。
     * @param {HTMLElement} el - リサイズ対象要素
     */
    function makeResizable(el) {
      // 既存ハンドルを削除（クローン再初期化時の重複防止）
      el.querySelectorAll('.resize-handle').forEach(h => h.remove());

      // コーナー4点 + 各辺中点4点 = 計8ハンドル
      ['tl', 'tc', 'tr', 'ml', 'mr', 'bl', 'bc', 'br'].forEach(corner => {
        const handle = document.createElement('div');
        handle.className = 'resize-handle';
        handle.dataset.corner = corner;

        handle.addEventListener('mousedown', (e) => {
          if (document.body.classList.contains('is-view-mode')) return;
          e.preventDefault();
          e.stopPropagation();

          const startX      = e.clientX;
          const startY      = e.clientY;
          const startLeft   = parseInt(el.style.left,   10) || 0;
          const startTop    = parseInt(el.style.top,    10) || 0;
          const startWidth  = el.offsetWidth;
          const startHeight = el.offsetHeight;
          const MIN_SIZE    = 10;

          // Shift 軸固定はコーナーハンドルのみ適用
          const isCorner = ['tl', 'tr', 'bl', 'br'].includes(corner);
          let axis       = null;
          let prevShift  = false;
          let shiftSnapX = null;
          let shiftSnapY = null;
          let frozenDx   = null;
          let frozenDy   = null;

          const onMove = (ev) => {
            // マウス移動量（視覚座標）をscaleで除してベース座標に変換する
            const scale = zoomLevel / 100;
            let dx = (ev.clientX - startX) / scale;
            let dy = (ev.clientY - startY) / scale;

            if (isCorner && ev.shiftKey) {
              // Shift を押した瞬間：基準点と dx/dy を記録して軸をリセット
              if (!prevShift) {
                shiftSnapX = ev.clientX;
                shiftSnapY = ev.clientY;
                frozenDx   = dx;
                frozenDy   = dy;
                axis       = null;
              }
              const ddx = ev.clientX - shiftSnapX;
              const ddy = ev.clientY - shiftSnapY;
              if (axis === null && (Math.abs(ddx) > 3 || Math.abs(ddy) > 3)) {
                axis = Math.abs(ddx) >= Math.abs(ddy) ? 'h' : 'v';
              }
              if (axis === 'h') dy = frozenDy;
              if (axis === 'v') dx = frozenDx;
            } else if (isCorner) {
              axis       = null;
              shiftSnapX = shiftSnapY = frozenDx = frozenDy = null;
            }
            prevShift = ev.shiftKey;

            if (corner === 'tl') {
              const newW = Math.max(startWidth  - dx, MIN_SIZE);
              const newH = Math.max(startHeight - dy, MIN_SIZE);
              el.style.left   = (startLeft + startWidth  - newW) + 'px';
              el.style.top    = (startTop  + startHeight - newH) + 'px';
              el.style.width  = newW + 'px';
              el.style.height = newH + 'px';
            } else if (corner === 'tc') {
              // 上辺中点：縦方向のみ
              const newH = Math.max(startHeight - dy, MIN_SIZE);
              el.style.top    = (startTop  + startHeight - newH) + 'px';
              el.style.height = newH + 'px';
            } else if (corner === 'tr') {
              const newH = Math.max(startHeight - dy, MIN_SIZE);
              el.style.top    = (startTop  + startHeight - newH) + 'px';
              el.style.width  = Math.max(startWidth  + dx, MIN_SIZE) + 'px';
              el.style.height = newH + 'px';
            } else if (corner === 'ml') {
              // 左辺中点：横方向のみ
              const newW = Math.max(startWidth  - dx, MIN_SIZE);
              el.style.left  = (startLeft + startWidth  - newW) + 'px';
              el.style.width = newW + 'px';
            } else if (corner === 'mr') {
              // 右辺中点：横方向のみ
              el.style.width = Math.max(startWidth + dx, MIN_SIZE) + 'px';
            } else if (corner === 'bl') {
              const newW = Math.max(startWidth  - dx, MIN_SIZE);
              el.style.left   = (startLeft + startWidth  - newW) + 'px';
              el.style.width  = newW + 'px';
              el.style.height = Math.max(startHeight + dy, MIN_SIZE) + 'px';
            } else if (corner === 'bc') {
              // 下辺中点：縦方向のみ
              el.style.height = Math.max(startHeight + dy, MIN_SIZE) + 'px';
            } else if (corner === 'br') {
              el.style.width  = Math.max(startWidth  + dx, MIN_SIZE) + 'px';
              el.style.height = Math.max(startHeight + dy, MIN_SIZE) + 'px';
            }
          };

          const onUp = () => {
            axis = null;
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup',   onUp);
            // リサイズが実際に行われた場合のみ Undo スタックに積む
            const curLeft   = parseInt(el.style.left,   10);
            const curTop    = parseInt(el.style.top,    10);
            const curWidth  = el.offsetWidth;
            const curHeight = el.offsetHeight;
            if (curLeft !== startLeft || curTop !== startTop || curWidth !== startWidth || curHeight !== startHeight) {
              pushUndo({ type: 'resize', el, prevLeft: startLeft, prevTop: startTop, prevWidth: startWidth, prevHeight: startHeight });
            }
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup',   onUp);
        });

        el.appendChild(handle);
      });
    }

    /**
     * クローン要素にクリックハンドラと draggable を再設定する。
     * Alt+ドラッグによるコピー後の再初期化に使用する。
     * @param {HTMLElement} el - 再初期化対象の要素
     */
    function reinitElement(el) {
      if (el.classList.contains('pagejump-obj')) {
        // ページ遷移オブジェクト：専用ハンドラとリサイズを再設定
        addPagejumpObjHandler(el);
        makeResizable(el);
      } else if (el.classList.contains('sticky-note')) {
        addStickyClickHandler(el);
        makeResizable(el);
      } else if (el.classList.contains('daimon-btn')) {
        addDaimonClickHandler(el);
        makeDraggable(el);
      } else if (el.classList.contains('kotae-btn')) {
        addKotaeClickHandler(el);
      } else if (el.classList.contains('shomei-btn')) {
        addShomeiClickHandler(el);
      } else if (el.dataset.type) {
        addAnnClickHandler(el);
        if (el.classList.contains('ann-object')) makeResizable(el);
      }
    }

    /**
     * 要素をドラッグで移動可能にする。
     * - Shift を押しながらドラッグ：水平または垂直に固定して移動
     * - Alt を押しながらドラッグ：要素をコピーしてドラッグ（オリジナルは元の位置に残る）
     * @param {HTMLElement} el - ドラッグ対象要素
     * @param {string} [excludeSelector] - この CSS セレクタにマッチする子要素からのドラッグは無視
     */
    function makeDraggable(el, excludeSelector) {
      el.addEventListener('mousedown', (e) => {
        if (document.body.classList.contains('is-view-mode')) return; // 閲覧モードはドラッグ無効
        if (excludeSelector && e.target.matches(excludeSelector)) return;
        e.preventDefault();
        e.stopPropagation();

        // 複数選択中の Alt+ドラッグ：全選択オブジェクトをまとめてコピー
        const selectedAll      = getSelectedObjects();
        const isInMultiSel     = selectedAll.length > 1 && selectedAll.includes(el);

        if (e.altKey && isInMultiSel) {
          // shomei-btn / kotae-btn を含む場合は事前に新 ID を採番してリマップ表を作成
          const shomeiIdMap = new Map();
          const kotaeIdMap  = new Map();
          selectedAll.forEach(orig => {
            if (orig.classList.contains('shomei-btn') && orig.dataset.shomeiId) {
              const oldId = orig.dataset.shomeiId;
              if (!shomeiIdMap.has(oldId)) shomeiIdMap.set(oldId, `shomei-${++shomeiCounter}`);
            }
            if (orig.classList.contains('kotae-btn') && orig.dataset.kotaeId) {
              const oldId = orig.dataset.kotaeId;
              if (!kotaeIdMap.has(oldId)) kotaeIdMap.set(oldId, `kotae-${++kotaeCounter}`);
            }
          });
          // 全選択オブジェクトをクローン（各オブジェクトの開始位置も記録）
          const clones = selectedAll.map(orig => {
            const clone = orig.cloneNode(true);
            clone.dataset.id = ++annIdCounter;
            clone.classList.remove('is-selected');
            // shomei-btn / 付箋 の shomeiId を新 ID にリマップ
            if (clone.classList.contains('shomei-btn') && clone.dataset.shomeiId) {
              const mapped = shomeiIdMap.get(clone.dataset.shomeiId);
              if (mapped) clone.dataset.shomeiId = mapped;
            }
            if (clone.classList.contains('sticky-note') && clone.dataset.shomeiId) {
              const mapped = shomeiIdMap.get(clone.dataset.shomeiId);
              if (mapped) clone.dataset.shomeiId = mapped;
            }
            // kotae-btn / 付箋 の kotaeId を新 ID にリマップ
            if (clone.classList.contains('kotae-btn') && clone.dataset.kotaeId) {
              const mapped = kotaeIdMap.get(clone.dataset.kotaeId);
              if (mapped) clone.dataset.kotaeId = mapped;
            }
            if (clone.classList.contains('sticky-note') && clone.dataset.kotaeId) {
              const mapped = kotaeIdMap.get(clone.dataset.kotaeId);
              if (mapped) clone.dataset.kotaeId = mapped;
            }
            orig.parentNode.appendChild(clone);
            makeDraggable(clone, excludeSelector);
            reinitElement(clone);
            return {
              clone,
              startLeft: parseInt(orig.style.left, 10) || 0,
              startTop:  parseInt(orig.style.top,  10) || 0
            };
          });
          // shomei-btn に対応する付箋が選択されていない場合は付箋も補完複製
          const clonedStickyShomeiIds = new Set(
            clones.filter(c => c.clone.classList.contains('sticky-note') && c.clone.dataset.shomeiId).map(c => c.clone.dataset.shomeiId)
          );
          shomeiIdMap.forEach((newId, oldId) => {
            if (clonedStickyShomeiIds.has(newId)) return;
            document.querySelectorAll(`.sticky-note[data-shomei-id="${oldId}"]`).forEach(origNote => {
              const noteClone = origNote.cloneNode(true);
              noteClone.dataset.id       = ++annIdCounter;
              noteClone.dataset.shomeiId = newId;
              noteClone.classList.remove('is-selected');
              origNote.parentNode.appendChild(noteClone);
              makeDraggable(noteClone, excludeSelector);
              reinitElement(noteClone);
              clones.push({
                clone:     noteClone,
                startLeft: parseInt(origNote.style.left, 10) || 0,
                startTop:  parseInt(origNote.style.top,  10) || 0
              });
            });
          });
          // kotae-btn に対応する付箋が選択されていない場合は付箋も補完複製
          const clonedStickyKotaeIds = new Set(
            clones.filter(c => c.clone.classList.contains('sticky-note') && c.clone.dataset.kotaeId).map(c => c.clone.dataset.kotaeId)
          );
          kotaeIdMap.forEach((newId, oldId) => {
            if (clonedStickyKotaeIds.has(newId)) return;
            document.querySelectorAll(`.sticky-note[data-kotae-id="${oldId}"]`).forEach(origNote => {
              const noteClone = origNote.cloneNode(true);
              noteClone.dataset.id      = ++annIdCounter;
              noteClone.dataset.kotaeId = newId;
              noteClone.classList.remove('is-selected');
              origNote.parentNode.appendChild(noteClone);
              makeDraggable(noteClone, excludeSelector);
              reinitElement(noteClone);
              clones.push({
                clone:     noteClone,
                startLeft: parseInt(origNote.style.left, 10) || 0,
                startTop:  parseInt(origNote.style.top,  10) || 0
              });
            });
          });

          const startX = e.clientX;
          const startY = e.clientY;

          // Shift 制約状態
          let axis2 = null, prevShift2 = false;
          let shiftSnapX2 = null, shiftSnapY2 = null;
          let frozenDx2   = null, frozenDy2   = null;

          const onMoveMulti = (ev) => {
            // マウス移動量（視覚座標）をscaleで除してベース座標に変換する
            const scale = zoomLevel / 100;
            let dx = (ev.clientX - startX) / scale;
            let dy = (ev.clientY - startY) / scale;

            if (ev.shiftKey) {
              if (!prevShift2) {
                shiftSnapX2 = ev.clientX; shiftSnapY2 = ev.clientY;
                frozenDx2   = dx;         frozenDy2   = dy;
                axis2       = null;
              }
              const ddx = ev.clientX - shiftSnapX2;
              const ddy = ev.clientY - shiftSnapY2;
              if (axis2 === null && (Math.abs(ddx) > 3 || Math.abs(ddy) > 3)) {
                axis2 = Math.abs(ddx) >= Math.abs(ddy) ? 'h' : 'v';
              }
              if (axis2 === 'h') dy = frozenDy2;
              if (axis2 === 'v') dx = frozenDx2;
            } else {
              axis2 = null;
              shiftSnapX2 = shiftSnapY2 = frozenDx2 = frozenDy2 = null;
            }
            prevShift2 = ev.shiftKey;

            // 全クローンに同じデルタを適用
            clones.forEach(({ clone, startLeft, startTop }) => {
              clone.style.left = (startLeft + dx) + 'px';
              clone.style.top  = (startTop  + dy) + 'px';
            });
            updateAlignPanel();
          };
          const onUpMulti = () => {
            document.removeEventListener('mousemove', onMoveMulti);
            document.removeEventListener('mouseup',   onUpMulti);
            // オリジナルの選択を解除し、クローンに選択を移す
            selectedStickySet.forEach(n => n.classList.remove('is-selected'));
            selectedStickySet.clear();
            document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected').forEach(a => a.classList.remove('is-selected'));
            clones.forEach(({ clone }) => {
              if (clone.classList.contains('sticky-note')) {
                selectedStickySet.add(clone);
              }
              clone.classList.add('is-selected');
            });
            // Alt+複数選択コピーは「作成」として Undo スタックに積む
            pushUndo({ type: 'create', elements: clones.map(c => c.clone) });
            const last = clones[clones.length - 1]?.clone;
            if (last) openAnnotationSettingsDialog(last.dataset.type || 'sticky', last);
            updateAlignPanel();
          };
          document.addEventListener('mousemove', onMoveMulti);
          document.addEventListener('mouseup',   onUpMulti);

          updateStatus(`Alt+ドラッグ：${selectedAll.length} 件のオブジェクトをコピーしました`);
          return;
        }

        // 複数選択中の通常ドラッグ：全選択オブジェクトをまとめて移動
        if (isInMultiSel) {
          const multiTargets = selectedAll.map(orig => ({
            el:        orig,
            startLeft: parseInt(orig.style.left, 10) || 0,
            startTop:  parseInt(orig.style.top,  10) || 0
          }));

          const startX = e.clientX;
          const startY = e.clientY;

          let axisM = null, prevShiftM = false;
          let shiftSnapXM = null, shiftSnapYM = null;
          let frozenDxM   = null, frozenDyM   = null;

          const onMoveM = (ev) => {
            // マウス移動量（視覚座標）をscaleで除してベース座標に変換する
            const scale = zoomLevel / 100;
            let dx = (ev.clientX - startX) / scale;
            let dy = (ev.clientY - startY) / scale;

            if (ev.shiftKey) {
              if (!prevShiftM) {
                shiftSnapXM = ev.clientX; shiftSnapYM = ev.clientY;
                frozenDxM   = dx;         frozenDyM   = dy;
                axisM       = null;
              }
              const ddx = ev.clientX - shiftSnapXM;
              const ddy = ev.clientY - shiftSnapYM;
              if (axisM === null && (Math.abs(ddx) > 3 || Math.abs(ddy) > 3)) {
                axisM = Math.abs(ddx) >= Math.abs(ddy) ? 'h' : 'v';
              }
              if (axisM === 'h') dy = frozenDyM;
              if (axisM === 'v') dx = frozenDxM;
            } else {
              axisM = null;
              shiftSnapXM = shiftSnapYM = frozenDxM = frozenDyM = null;
            }
            prevShiftM = ev.shiftKey;

            multiTargets.forEach(({ el: t, startLeft, startTop }) => {
              t.style.left = (startLeft + dx) + 'px';
              t.style.top  = (startTop  + dy) + 'px';
            });
            updateAlignPanel();
          };
          const onUpM = () => {
            document.removeEventListener('mousemove', onMoveM);
            document.removeEventListener('mouseup',   onUpM);
            // 移動が実際に行われた場合のみ Undo スタックに積む
            const movedTargets = multiTargets.filter(({ el: t, startLeft, startTop }) =>
              parseInt(t.style.left, 10) !== startLeft || parseInt(t.style.top, 10) !== startTop
            );
            if (movedTargets.length > 0) {
              pushUndo({ type: 'move', targets: movedTargets.map(({ el: t, startLeft, startTop }) => ({ el: t, prevLeft: startLeft, prevTop: startTop, afterLeft: parseInt(t.style.left, 10), afterTop: parseInt(t.style.top, 10) })) });
            }
            updateAlignPanel();
          };
          document.addEventListener('mousemove', onMoveM);
          document.addEventListener('mouseup',   onUpM);
          return;
        }

        let target = el;
        let altCopied = false; // Alt コピーフラグ
        let altExtraClones = []; // 追加複製された要素（Undo 用）

        // Alt+ドラッグ（単体）：クローンを作成してドラッグ（オリジナルは元の位置に残る）
        if (e.altKey) {
          const clone = el.cloneNode(true);
          clone.dataset.id = ++annIdCounter;
          clone.classList.remove('is-selected');
          // shomei-btn の場合：新 shomeiId を採番し、紐付き付箋も複製
          if (clone.classList.contains('shomei-btn') && clone.dataset.shomeiId) {
            const oldShomeiId = clone.dataset.shomeiId;
            const newShomeiId = `shomei-${++shomeiCounter}`;
            clone.dataset.shomeiId = newShomeiId;
            document.querySelectorAll(`.sticky-note[data-shomei-id="${oldShomeiId}"]`).forEach(origNote => {
              const noteClone = origNote.cloneNode(true);
              noteClone.dataset.id       = ++annIdCounter;
              noteClone.dataset.shomeiId = newShomeiId;
              noteClone.classList.remove('is-selected');
              origNote.parentNode.appendChild(noteClone);
              makeDraggable(noteClone, excludeSelector);
              reinitElement(noteClone);
              altExtraClones.push(noteClone);
            });
          }
          // kotae-btn の場合：新 kotaeId を採番し、紐付き付箋も複製
          if (clone.classList.contains('kotae-btn') && clone.dataset.kotaeId) {
            const oldKotaeId = clone.dataset.kotaeId;
            const newKotaeId = `kotae-${++kotaeCounter}`;
            clone.dataset.kotaeId = newKotaeId;
            document.querySelectorAll(`.sticky-note[data-kotae-id="${oldKotaeId}"]`).forEach(origNote => {
              const noteClone = origNote.cloneNode(true);
              noteClone.dataset.id      = ++annIdCounter;
              noteClone.dataset.kotaeId = newKotaeId;
              noteClone.classList.remove('is-selected');
              origNote.parentNode.appendChild(noteClone);
              makeDraggable(noteClone, excludeSelector);
              reinitElement(noteClone);
              altExtraClones.push(noteClone);
            });
          }
          el.parentNode.appendChild(clone);
          makeDraggable(clone, excludeSelector);
          reinitElement(clone);
          target = clone;
          altCopied = true;
          updateStatus('Alt+ドラッグ：オブジェクトをコピーしました');
        }

        const startX    = e.clientX;
        const startY    = e.clientY;
        const startLeft = parseInt(target.style.left, 10) || 0;
        const startTop  = parseInt(target.style.top,  10) || 0;

        // Shift制約：Shift を押した瞬間の位置を起点に軸を判定して固定する
        let axis       = null;
        let prevShift  = false;
        let shiftSnapX = null; // Shift 押下時の clientX
        let shiftSnapY = null; // Shift 押下時の clientY
        let frozenDx   = null; // 固定軸で凍結する dx 値
        let frozenDy   = null; // 固定軸で凍結する dy 値

        const onMove = (ev) => {
          // マウス移動量（視覚座標）をscaleで除してベース座標に変換する
          const scale = zoomLevel / 100;
          let dx = (ev.clientX - startX) / scale;
          let dy = (ev.clientY - startY) / scale;

          // Shift を押した瞬間：その時点の位置・dx/dy を記録して軸をリセット
          if (ev.shiftKey) {
            if (!prevShift) {
              shiftSnapX = ev.clientX;
              shiftSnapY = ev.clientY;
              frozenDx   = dx;
              frozenDy   = dy;
              axis       = null;
            }
            // Shift 押下時点からの増分で軸を決定
            const ddx = ev.clientX - shiftSnapX;
            const ddy = ev.clientY - shiftSnapY;
            if (axis === null && (Math.abs(ddx) > 3 || Math.abs(ddy) > 3)) {
              axis = Math.abs(ddx) >= Math.abs(ddy) ? 'h' : 'v';
            }
            // 固定軸は Shift 押下時の値で凍結
            if (axis === 'h') dy = frozenDy;
            if (axis === 'v') dx = frozenDx;
          } else {
            // Shift を離したら制約を全解除
            axis = null;
            shiftSnapX = shiftSnapY = frozenDx = frozenDy = null;
          }
          prevShift = ev.shiftKey;

          target.style.left = (startLeft + dx) + 'px';
          target.style.top  = (startTop  + dy) + 'px';
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup',   onUp);
          axis = null;
          if (altCopied) {
            // Alt コピー完了：オリジナルの選択を解除してクローンに選択を移す
            el.classList.remove('is-selected');
            selectedStickySet.delete(el);
            if (target.classList.contains('sticky-note')) {
              selectedStickySet.add(target);
            }
            target.classList.add('is-selected');
            // Alt コピーは「作成」として Undo スタックに積む
            pushUndo({ type: 'create', elements: [target, ...altExtraClones] });
            openAnnotationSettingsDialog(target.dataset.type || 'sticky', target);
            updateAlignPanel();
          } else {
            // 通常ドラッグ：移動が実際に行われた場合のみ Undo スタックに積む
            const curLeft = parseInt(target.style.left, 10);
            const curTop  = parseInt(target.style.top,  10);
            if (curLeft !== startLeft || curTop !== startTop) {
              pushUndo({ type: 'move', targets: [{ el: target, prevLeft: startLeft, prevTop: startTop, afterLeft: curLeft, afterTop: curTop }] });
            }
          }
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
      });
    }

    /* キーボードイベント（Esc / Delete / Space / Cmd+C / Cmd+V） */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        cancelDragSelect();
        closeQuickCreateDialog();
        if (currentDrawType) deactivateAnnotationMode();
        closeDialog();
        document.querySelector('.dialog-btn.ok').onclick = saveDialog;
        updateStatus('描画をキャンセルしました');
      }

      // Deleteキー：選択中のオブジェクトを削除（入力フィールドにフォーカス中は無効）
      if (e.key === 'Delete') {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        if (document.body.classList.contains('is-view-mode')) return;

        let deleted = 0;

        // 削除前にスナップショットを取得して Undo スタックに積む
        const deleteSnapshots = [];
        const linkedStickyChanges = [];

        // 付箋のスナップショット
        selectedStickySet.forEach(note => {
          deleteSnapshots.push({
            className:   note.className.replace(/\bis-selected\b/g, '').trim(),
            id:          note.dataset.id,
            type:        note.dataset.type || 'sticky',
            savedData:   note.dataset.savedData,
            groupId:     note.dataset.groupId,
            daimonId:    note.dataset.daimonId,
            kotaeId:     note.dataset.kotaeId,
            kotaeOrigBg: note.dataset.kotaeOrigBg,
            styleCssText: note.style.cssText,
            pageNum:     note.dataset.page || '1',
          });
        });

        // アノテーションのスナップショット
        document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected').forEach(ann => {
          deleteSnapshots.push({
            className:   ann.className.replace(/\bis-selected\b/g, '').trim(),
            id:          ann.dataset.id,
            type:        ann.dataset.type,
            savedData:   ann.dataset.savedData,
            styleCssText: ann.style.cssText,
            pageNum:     ann.dataset.page || '1',
          });
        });

        // ページ遷移オブジェクトのスナップショット
        document.querySelectorAll('.pagejump-obj.is-selected').forEach(pj => {
          deleteSnapshots.push({
            className:    pj.className.replace(/\bis-selected\b/g, '').trim(),
            id:           pj.dataset.id,
            type:         'pagejump',
            savedData:    pj.dataset.savedData,
            styleCssText: pj.style.cssText,
            pageNum:      pj.dataset.page || '1',
          });
        });

        // 各種ボタンのスナップショット
        document.querySelectorAll('.daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected').forEach(btn => {
          deleteSnapshots.push({
            className:   btn.className.replace(/\bis-selected\b/g, '').trim(),
            id:          btn.dataset.id,
            type:        btn.dataset.type,
            daimonId:    btn.dataset.daimonId,
            kotaeId:     btn.dataset.kotaeId,
            shomeiId:    btn.dataset.shomeiId,
            styleCssText: btn.style.cssText,
            pageNum:     btn.dataset.page || '1',
          });
          // 大問ボタン削除に伴う付箋の daimonId 変化を記録
          if (btn.classList.contains('daimon-btn')) {
            const did = btn.dataset.daimonId;
            if (did) {
              document.querySelectorAll(`.sticky-note[data-daimon-id="${did}"]`).forEach(n => {
                linkedStickyChanges.push({ el: n, daimonId: did });
              });
            }
          }
          // 答ボタン削除に伴う付箋の kotaeId・背景色変化を記録
          if (btn.classList.contains('kotae-btn')) {
            const kid = btn.dataset.kotaeId;
            if (kid) {
              document.querySelectorAll(`.sticky-note[data-kotae-id="${kid}"]`).forEach(n => {
                linkedStickyChanges.push({
                  el: n, kotaeId: kid,
                  kotaeOrigBg: n.dataset.kotaeOrigBg,
                  background:  n.style.background,
                });
              });
            }
          }
          // 証明ボタン削除に伴う付箋の shomeiId・背景色・枠線変化を記録
          if (btn.classList.contains('shomei-btn')) {
            const sid = btn.dataset.shomeiId;
            if (sid) {
              document.querySelectorAll(`.sticky-note[data-shomei-id="${sid}"]`).forEach(n => {
                linkedStickyChanges.push({
                  el: n, shomeiId: sid,
                  shomeiOrigBg:     n.dataset.shomeiOrigBg,
                  shomeiOutline:    n.dataset.shomeiOutline,
                  background:       n.style.background,
                  outline:          n.style.outline,
                });
              });
            }
          }
        });

        if (deleteSnapshots.length > 0) {
          pushUndo({ type: 'delete', snapshots: deleteSnapshots, linkedStickyChanges });
        }

        // 選択中の付箋を削除
        selectedStickySet.forEach(note => {
          note.remove();
          deleted++;
        });
        selectedStickySet.clear();

        // 選択中のアノテーションを削除
        document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected').forEach(ann => {
          ann.remove();
          deleted++;
        });

        // 選択中の大問ボタンを削除（紐付き付箋の daimon-id も解除）
        document.querySelectorAll('.daimon-btn.is-selected').forEach(btn => {
          const did = btn.dataset.daimonId;
          if (did) {
            document.querySelectorAll(`.sticky-note[data-daimon-id="${did}"]`)
              .forEach(n => { delete n.dataset.daimonId; });
          }
          btn.remove();
          deleted++;
        });

        // 選択中の答ボタンを削除（紐付き付箋の元色を復元）
        document.querySelectorAll('.kotae-btn.is-selected').forEach(btn => {
          const kid = btn.dataset.kotaeId;
          if (kid) {
            document.querySelectorAll(`.sticky-note[data-kotae-id="${kid}"]`).forEach(n => {
              if (n.dataset.kotaeOrigBg !== undefined) {
                n.style.background = n.dataset.kotaeOrigBg;
                delete n.dataset.kotaeOrigBg;
              }
              delete n.dataset.kotaeId;
            });
          }
          btn.remove();
          deleted++;
        });

        // 選択中のページ遷移オブジェクトを削除
        document.querySelectorAll('.pagejump-obj.is-selected').forEach(pj => {
          pj.remove();
          deleted++;
        });

        // 選択中の証明ボタンを削除（紐付き付箋の shomei-id・枠線・元色を復元）
        document.querySelectorAll('.shomei-btn.is-selected').forEach(btn => {
          const sid = btn.dataset.shomeiId;
          if (sid) {
            document.querySelectorAll(`.sticky-note[data-shomei-id="${sid}"]`).forEach(n => {
              if (n.dataset.shomeiOrigBg !== undefined) {
                n.style.background = n.dataset.shomeiOrigBg;
                delete n.dataset.shomeiOrigBg;
              }
              n.style.outline = '';
              delete n.dataset.shomeiOutline;
              delete n.dataset.shomeiId;
            });
          }
          btn.remove();
          deleted++;
        });

        if (deleted > 0) {
          closeDialog();
          updateStatus(`${deleted} 件のオブジェクトを削除しました`);
        }
      }

      // Cmd+Z / Ctrl+Z：操作を1つ取り消す
      if (e.key === 'z' && (e.metaKey || e.ctrlKey) && !e.shiftKey) {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        undo();
      }

      // Cmd+Shift+Z / Ctrl+Shift+Z：取り消した操作をやり直す（Redo）
      if (e.key === 'z' && (e.metaKey || e.ctrlKey) && e.shiftKey) {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        redo();
      }

      // Cmd+A / Ctrl+A：ページ内の全オブジェクトを選択
      if (e.key === 'a' && (e.metaKey || e.ctrlKey)) {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        selectAllObjects();
      }

      // Cmd+C / Ctrl+C：選択中オブジェクトをコピー
      if (e.key === 'c' && (e.metaKey || e.ctrlKey)) {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        copySelectedObjects();
      }

      // Cmd+V / Ctrl+V：クリップボードからペースト
      if (e.key === 'v' && (e.metaKey || e.ctrlKey)) {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        pasteClipboard();
      }

      // 矢印キー（右/下：次ページ、左/上：前ページ）でページ移動
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        nextPage();
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        prevPage();
      }

      // Spaceキー：パンモードを開始（入力フィールドにフォーカス中は無効）
      if (e.code === 'Space') {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault(); // ブラウザのページスクロールを防ぐ
        if (!isSpaceHeld) {
          isSpaceHeld = true;
          document.getElementById('viewArea').classList.add('space-pan-mode');
        }
      }
    });

    /* Spaceキー離し：パンモードを解除 */
    document.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        isSpaceHeld = false;
        isPanning   = false;
        document.getElementById('viewArea').classList.remove('space-pan-mode', 'is-panning');
      }
    });

    /* ==================================
       Spaceキー＋ドラッグによるページパン
    ================================== */

    /**
     * パン操作を開始する。
     * viewArea 上でのマウスダウン時にスペースキーが押されていれば呼び出される。
     */
    document.getElementById('viewArea').addEventListener('mousedown', (e) => {
      if (!isSpaceHeld) return;
      e.preventDefault();
      isPanning  = true;
      panStartX  = e.clientX - panOffsetX;
      panStartY  = e.clientY - panOffsetY;
      document.getElementById('viewArea').classList.add('is-panning');
    });

    /**
     * ページ外（グレーエリア）からドラッグ選択を開始する。
     * ページ内のクリックはバブリングで到達するが、#pageLeft 発火のインラインハンドラに委ねる。
     */
    document.getElementById('viewArea').addEventListener('mousedown', (e) => {
      if (isSpaceHeld)    return; // パンモード中はスキップ
      if (document.body.classList.contains('is-view-mode')) return; // 閲覧モード中はドラッグ選択を禁止
      if (currentDrawType) return; // 描画モード中はページ内からのみ許可
      if (e.target.closest('#pageLeft')) return; // ページ内のクリックは onPageMouseDown に任せる
      // オブジェクト上のクリックはスキップ
      if (e.target.closest('.sticky-note') ||
          e.target.closest('.ann-object')  ||
          e.target.closest('.ann-icon-obj') ||
          e.target.closest('.daimon-btn')  ||
          e.target.closest('.kotae-btn')   ||
          e.target.closest('.shomei-btn')) return;
      e.preventDefault();
      dragSelectStartPos    = getPageRelativePos(e);
      dragSelectClientStart = { x: e.clientX, y: e.clientY };
      isDragSelecting = true;
      // dragSelectPreviewEl は onDragSelectMove 内で閾値超過後に遅延作成する
      document.addEventListener('mousemove', onDragSelectMove);
    });

    /**
     * パン中のマウス移動でページコンテナを平行移動する。
     */
    document.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      panOffsetX = e.clientX - panStartX;
      panOffsetY = e.clientY - panStartY;
      document.getElementById('pageContainer').style.transform =
        `translate(${panOffsetX}px, ${panOffsetY}px)`;
    });

    /**
     * 右クリックメニュー表示時にドラッグ選択をキャンセルする。
     * 右クリックは mouseup が発火しないブラウザがあるため contextmenu で補完する。
     */
    document.addEventListener('contextmenu', () => {
      cancelDragSelect();
    });

    /**
     * ウィンドウがフォーカスを失ったとき（他のアプリへの切り替えなど）に
     * ドラッグ選択をキャンセルする。
     */
    window.addEventListener('blur', () => {
      cancelDragSelect();
    });

    /**
     * マウスボタンを離したらパンを終了する。
     */
    document.addEventListener('mouseup', () => {
      if (!isPanning) return;
      isPanning = false;
      document.getElementById('viewArea').classList.remove('is-panning');
    });

    /**
     * ページ外でマウスボタンを離したとき、ドラッグ選択をクリーンアップし必要に応じて確定する。
     * onPageMouseUp は #pageLeft 上でのみ発火するため、
     * document レベルで補足する。ページ内リリース時は onPageMouseUp が先に確定するため、
     * isDragSelecting が false になっているからここではスキップされる。
     */
    document.addEventListener('mouseup', (e) => {
      if (!isDragSelecting) return;
      isDragSelecting = false;
      document.removeEventListener('mousemove', onDragSelectMove);
      dragSelectPreviewEl?.remove();
      dragSelectPreviewEl   = null;
      dragSelectClientStart = null;
      const start = dragSelectStartPos;
      dragSelectStartPos = null;
      if (start) {
        const endPos = getPageRelativePos(e);
        const x = Math.min(endPos.x, start.x);
        const y = Math.min(endPos.y, start.y);
        const w = Math.abs(endPos.x - start.x);
        const h = Math.abs(endPos.y - start.y);
        if (w >= 5 || h >= 5) {
          // 十分な大きさの矩形であれば選択確定
          finalizeDragSelect(x, y, w, h, e.shiftKey);
        }
        // w < 5 && h < 5 はクリック扱い：グレーエリアでの単クリックで誤って選択解除しないよう何もしない
      }
    });

    /**
     * ページ外でマウスボタンを離したとき、描画プレビューをクリーンアップし必要に応じて確定する。
     * onPageMouseUp は #pageLeft 上でのみ発火するため、document レベルで補足する。
     * ページ内リリース時は onPageMouseUp が先に drawStartPos = null にするためここではスキップされる。
     */
    document.addEventListener('mouseup', (e) => {
      if (!currentDrawType || !drawStartPos) return;
      document.removeEventListener('mousemove', onDrawPreviewMove);
      drawPreviewEl?.remove();
      drawPreviewEl   = null;
      drawClientStart = null;
      const start = drawStartPos;
      drawStartPos = null;
      const endPos = getPageRelativePos(e);
      const x = Math.min(endPos.x, start.x);
      const y = Math.min(endPos.y, start.y);
      const w = Math.abs(endPos.x - start.x);
      const h = Math.abs(endPos.y - start.y);
      if (w < 10 && h < 10) {
        // クリック扱い：クイック作成ポップアップを表示
        openQuickCreateDialog(currentDrawType, start.x, start.y, e.clientX, e.clientY);
        return;
      }
      // ページ遷移オブジェクト：ドラッグ作成時もポップアップを表示して遷移先を設定させる
      if (currentDrawType === 'pagejump') {
        pendingRect = { x, y, w, h };
        openQuickCreateDialog(currentDrawType, start.x + w / 2, start.y + h / 2, e.clientX, e.clientY);
        return;
      }
      // ドラッグ作成：マーカー形式で即時作成
      pendingRect = { x, y, w, h };
      const _specForm = document.getElementById('dialogFormSpecific');
      if (_specForm) {
        const _dtEl = _specForm.querySelector('#annDisplayType');
        if (_dtEl) {
          _dtEl.value = 'marker';
        } else {
          const _inp = document.createElement('input');
          _inp.type = 'hidden'; _inp.id = 'annDisplayType'; _inp.value = 'marker';
          _inp.dataset.qcInject = '1';
          _specForm.appendChild(_inp);
        }
      }
      confirmAnnotation(currentDrawType);
      if (_specForm) _specForm.querySelectorAll('[data-qc-inject]').forEach(el => el.remove());
    });

    /**
     * アノテーションアイコンを選択状態にする。
     * @param {HTMLElement} el - 選択したアノテーション要素
     */
    function selectAnnotation(el) {
      // 前の選択解除
      if (selectedAnnotation) {
        selectedAnnotation.classList.remove('selected');
      }
      selectedAnnotation = el;
      el.classList.add('selected');
      updateStatus('アノテーション選択中: ' + (el.title || ''));
    }

    /* ============================
       ページ操作
    ============================ */

    /**
     * ページを次へ進める。
     */
    function nextPage() {
      if (currentPage < totalPages) {
        currentPage++;
        updatePageDisplay();
      }
    }

    /**
     * ページを前へ戻る。
     */
    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        updatePageDisplay();
      }
    }

    /**
     * 最初のページへ移動する。
     */
    function goFirstPage() {
      currentPage = 1;
      updatePageDisplay();
    }

    /**
     * 最後のページへ移動する。
     */
    function goLastPage() {
      currentPage = totalPages;
      updatePageDisplay();
    }

    /**
     * ページ表示を更新する。
     */
    function updatePageDisplay() {

      document.getElementById('pageInput').value = currentPage;
      // 合計ページ数表示を更新
      const totalPagesText = document.getElementById('totalPagesText');
      if (totalPagesText) {
        totalPagesText.textContent = `/ ${totalPages}`;
      }

      // ページ移動時に選択を全解除する
      deselectAllObjects();

      // PDFページを描画
      if (pdfDoc) renderPage(currentPage);

      // 前ページ・最初ページのボタン活性制御
      const navBtns = document.querySelectorAll('.nav-btn');
      const firstBtn = navBtns[0];
      const prevBtn  = navBtns[1];
      const nextBtn  = navBtns[2];
      const lastBtn  = navBtns[3];
      if (currentPage <= 1) {
        prevBtn?.classList.add('disabled');
        firstBtn?.classList.add('disabled');
      } else {
        prevBtn?.classList.remove('disabled');
        firstBtn?.classList.remove('disabled');
      }
      if (currentPage >= totalPages) {
        nextBtn?.classList.add('disabled');
        lastBtn?.classList.add('disabled');
      } else {
        nextBtn?.classList.remove('disabled');
        lastBtn?.classList.remove('disabled');
      }
      // 現在ページのアノテーションのみ表示する
      updateAnnotationVisibility();
      // A-9: スライドナビゲーションボタンの表示制御
      const slideNavPrev = document.getElementById('slideNavPrev');
      const slideNavNext = document.getElementById('slideNavNext');
      if (slideNavPrev) slideNavPrev.classList.toggle('is-hidden', currentPage <= 1);
      if (slideNavNext) slideNavNext.classList.toggle('is-hidden', currentPage >= totalPages);
    }

    /**
     * 現在ページに属するアノテーションのみ表示し、他ページのアノテーションを非表示にする。
     */
    function updateAnnotationVisibility() {
      document.querySelectorAll(
        '#pageLeft .sticky-note, #pageLeft .ann-object, #pageLeft .ann-icon-obj, ' +
        '#pageLeft .daimon-btn, ' +
        '#pageLeft .kotae-btn, #pageLeft .shomei-btn, #pageLeft .pagejump-obj'
      ).forEach(el => {
        const elPage = parseInt(el.dataset.page || '1', 10);
        el.classList.toggle('ann-hidden-page', elPage !== currentPage);
      });
    }

    /**
     * B-6: ウィンドウリサイズ時に比率データを持つアノテーションを再配置する。
     * data-x-ratio / data-y-ratio / data-w-ratio / data-h-ratio を参照して絶対位置に変換する。
     */
    function repositionAnnotationsByRatio() {
      const pageEl = document.getElementById('pageLeft');
      if (!pageEl) return;
      const pageW = pageEl.offsetWidth;
      const pageH = pageEl.offsetHeight;
      pageEl.querySelectorAll('[data-x-ratio]').forEach(el => {
        el.style.left   = (parseFloat(el.dataset.xRatio) * pageW) + 'px';
        el.style.top    = (parseFloat(el.dataset.yRatio) * pageH) + 'px';
        if (el.dataset.wRatio) el.style.width  = (parseFloat(el.dataset.wRatio) * pageW) + 'px';
        if (el.dataset.hRatio) el.style.height = (parseFloat(el.dataset.hRatio) * pageH) + 'px';
      });
    }

    /**
     * PDFを読み込んで最初のページを表示する。
     * @param {string} path - PDFファイルのパス
     */
    async function loadPDF(path) {
      try {
        // cMapUrl：日本語など CID フォントの文字マッピングに必須
        // standardFontDataUrl：埋め込みフォントがない場合の代替フォントデータ
        const BASE = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/';
        pdfDoc = await pdfjsLib.getDocument({
          url:                 path,
          cMapUrl:             BASE + 'cmaps/',
          cMapPacked:          true,
          standardFontDataUrl: BASE + 'standard_fonts/',
        }).promise;
        totalPages = pdfDoc.numPages;
        const pageInput = document.getElementById('pageInput');
        if (pageInput) pageInput.dataset.max = totalPages;
        currentPage = 1;
        // 最初のページのアスペクト比を取得して PAGE_ASPECT を更新
        const firstPage = await pdfDoc.getPage(1);
        const vp = firstPage.getViewport({ scale: 1 });
        PAGE_ASPECT = vp.width / vp.height;
        resizePage();
        updatePageDisplay();
      } catch (err) {
        console.error('PDF読み込みエラー:', err);
      }
    }

    /**
     * 指定ページをcanvasに描画する。
     * @param {number} num - 描画するページ番号（1始まり）
     */
    async function renderPage(num) {
      if (!pdfDoc) return;

      // 前の描画タスクをキャンセルして競合（ページ混じり）を防ぐ
      if (_currentRenderTask) {
        _currentRenderTask.cancel();
        _currentRenderTask = null;
      }

      // 世代番号を取得（await 中に新しい renderPage が呼ばれたら中断する）
      const renderVersion = ++_renderVersion;

      const pdfPage = await pdfDoc.getPage(num);

      // より新しい renderPage が呼ばれていた場合は描画をスキップ
      if (renderVersion !== _renderVersion) return;

      const canvas  = document.getElementById('pdfCanvas');
      const pageEl  = document.getElementById('pageLeft');
      // 表示サイズに合わせてスケールを計算する（高解像度のためデバイスピクセル比を考慮）
      const baseViewport = pdfPage.getViewport({ scale: 1 });

      // ページごとにアスペクト比を更新（ページサイズが異なる PDF に対応）
      const pageAspect = baseViewport.width / baseViewport.height;
      if (Math.abs(pageAspect - PAGE_ASPECT) > 0.001) {
        PAGE_ASPECT = pageAspect;
        resizePage();
      }

      const dpr   = window.devicePixelRatio || 1;
      const scale = (pageEl.offsetWidth / baseViewport.width) * dpr;
      const viewport = pdfPage.getViewport({ scale });

      // canvas サイズを更新し、確実にクリアする
      // （同じサイズの場合 canvas.width 代入でもリセットされないため clearRect で明示クリア）
      const newW = Math.round(viewport.width);
      const newH = Math.round(viewport.height);
      canvas.width  = newW;
      canvas.height = newH;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, newW, newH);

      // CSS サイズを明示的に設定し、100% 自動計算による文字位置ずれを防ぐ
      canvas.style.width  = Math.round(newW / dpr) + 'px';
      canvas.style.height = Math.round(newH / dpr) + 'px';

      try {
        _currentRenderTask = pdfPage.render({
          canvasContext: ctx,
          viewport,
          // 'print' インテントは特色（Separation/DeviceN 色空間）や高精度フォント配置に対応
          intent: 'print',
        });
        await _currentRenderTask.promise;
      } catch (err) {
        if (err?.name !== 'RenderingCancelledException') {
          console.error('PDF描画エラー:', err);
        }
      } finally {
        _currentRenderTask = null;
      }
    }

    /* ============================
       拡大縮小
    ============================ */

    /**
     * ページ内の全アノテーションの位置・サイズをズーム比率に合わせてスケールする。
     * @param {number} ratio - 新旧ズームの比率（newZoom / oldZoom）
     */
    function scaleAnnotations(ratio) {
      if (ratio === 1) return;
      document.querySelectorAll('#pageLeft .sticky-note, #pageLeft .ann-object, #pageLeft .ann-icon-obj, #pageLeft .pagejump-obj').forEach(el => {
        el.style.left = ((parseFloat(el.style.left) || 0) * ratio) + 'px';
        el.style.top  = ((parseFloat(el.style.top)  || 0) * ratio) + 'px';
        const w = parseFloat(el.style.width)  || el.offsetWidth;
        const h = parseFloat(el.style.height) || el.offsetHeight;
        el.style.width  = (w * ratio) + 'px';
        el.style.height = (h * ratio) + 'px';
      });
    }

    /**
     * ズームレベルを変更し、アノテーションの位置・サイズを追従させる。
     * マウス座標が指定された場合はその点を中心にズームする。
     * 座標が未指定の場合はビュー中心を基準にズームする。
     * @param {number}  newZoom       - 新しいズームレベル（50〜200）
     * @param {number} [mouseClientX] - マウスのビューポートX座標
     * @param {number} [mouseClientY] - マウスのビューポートY座標
     */
    function applyZoomChange(newZoom, mouseClientX, mouseClientY) {
      const oldZoom = zoomLevel;
      if (newZoom === oldZoom) return;

      const ratio = newZoom / oldZoom;

      // ズームレベルを更新してページをリサイズ（CSS scaleを更新するのみ。オブジェクト座標は変更しない）
      zoomLevel = newZoom;
      resizePage();

      // パンオフセットを調整（マウス中心 or ビュー中心）
      // 公式: newPan = (M - viewCenter) * (1 - ratio) + oldPan * ratio
      const viewRect   = document.getElementById('viewArea').getBoundingClientRect();
      const viewCenterX = viewRect.left + viewRect.width  / 2;
      const viewCenterY = viewRect.top  + viewRect.height / 2;
      const mX = (mouseClientX !== undefined) ? mouseClientX : viewCenterX;
      const mY = (mouseClientY !== undefined) ? mouseClientY : viewCenterY;

      panOffsetX = (mX - viewCenterX) * (1 - ratio) + panOffsetX * ratio;
      panOffsetY = (mY - viewCenterY) * (1 - ratio) + panOffsetY * ratio;
      document.getElementById('pageContainer').style.transform =
        `translate(${panOffsetX}px, ${panOffsetY}px)`;

      // 複数選択バウンディングボックスを更新
      updateAlignPanel();
    }

    /**
     * ズームインする。
     */
    function zoomIn() {
      if (zoomLevel < 200) {
        applyZoomChange(Math.min(200, zoomLevel + 10));
      }
    }

    /**
     * ズームアウトする。
     */
    function zoomOut() {
      if (zoomLevel > 50) {
        applyZoomChange(Math.max(50, zoomLevel - 10));
      }
    }

    /* ページのアスペクト比（幅 / 高さ）。PDF読み込み後に実際の比率で上書きされる */
    let PAGE_ASPECT = 420 / 560;

    /* 現在のフィットモード */
    let fitMode = 'height';

    /**
     * ビューエリアのサイズに合わせてページをリサイズする。
     */
    function resizePage() {
      const view = document.getElementById('viewArea');
      const page = document.getElementById('pageLeft');
      const padding = 48;

      // ベースサイズ（ズーム100%相当）を計算する。ズームはCSS transformで適用するため除外。
      if (fitMode === 'height') {
        const h = view.clientHeight - padding;
        const w = h * PAGE_ASPECT;
        page.style.height = h + 'px';
        page.style.width  = w + 'px';
      } else if (fitMode === 'width') {
        const w = view.clientWidth - padding;
        const h = w / PAGE_ASPECT;
        page.style.width  = w + 'px';
        page.style.height = h + 'px';
      } else if (fitMode === 'page') {
        const viewW = view.clientWidth  - padding;
        const viewH = view.clientHeight - padding;
        let w, h;
        if (viewW / viewH < PAGE_ASPECT) {
          w = viewW;
          h = w / PAGE_ASPECT;
        } else {
          h = viewH;
          w = h * PAGE_ASPECT;
        }
        page.style.width  = w + 'px';
        page.style.height = h + 'px';
      }
      // ズームをCSS scaleで適用する（オブジェクトのleft/top/width/heightは変化しない）
      page.style.transform       = `scale(${zoomLevel / 100})`;
      page.style.transformOrigin = 'center center';
    }

    /**
     * ズームを適用する。
     */
    function applyZoom() {
      resizePage();
    }

    /* ============================
       フィット設定
    ============================ */

    /**
     * フィット方法を変更する。
     * フィット変更時はアノテーションを新しいページサイズに追従させ、パンもリセットする。
     * @param {string} mode - フィットモード（'page'|'height'|'width'）
     */
    function setFit(mode) {
      const page = document.getElementById('pageLeft');
      const oldW = page.offsetWidth;

      fitMode   = mode;
      zoomLevel = 100;
      document.querySelectorAll('.fit-btn').forEach(b => b.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      resizePage();

      const newW = page.offsetWidth;
      if (oldW > 0 && newW !== oldW) {
        scaleAnnotations(newW / oldW);
      }

      // パンオフセットをリセットしてページを中央に戻す
      panOffsetX = 0;
      panOffsetY = 0;
      document.getElementById('pageContainer').style.transform = 'none';

      updateAlignPanel();
      updateStatus('表示フィット: ' + { page: 'ページ全体', height: '高さ', width: '幅' }[mode]);
      // ページCSSサイズ変更後にPDFcanvasを新サイズで再描画
      if (pdfDoc) renderPage(currentPage);
    }

    /* ============================
       ナビゲーション折りたたみ
    ============================ */

    /**
     * ナビゲーションバーの表示切替。
     */
    function toggleNav() {
      // ヘッダーの表示/非表示をトグルする
      const nav = document.querySelector('.nav');
      const revealBtn = document.getElementById('navRevealBtn');
      const toggleBtn = nav.querySelector('[onclick="toggleNav()"]');
      const isHidden = nav.classList.toggle('is-hidden');

      // 展開ボタンの表示切替
      if (revealBtn) revealBtn.style.display = isHidden ? 'flex' : 'none';

      // ナビ内ボタンのツールチップ更新
      if (toggleBtn) toggleBtn.dataset.tip = isHidden ? 'ナビを展開する' : 'ナビを折りたたむ';

      // ナビ高さ変化後にビューエリアサイズが変わるため、ページサイズを再計算してcanvasを再描画
      requestAnimationFrame(() => {
        const page = document.getElementById('pageLeft');
        const oldW = page.offsetWidth;
        resizePage();
        const newW = page.offsetWidth;
        if (oldW > 0 && newW !== oldW) scaleAnnotations(newW / oldW);
        repositionAnnotationsByRatio();
        if (pdfDoc) renderPage(currentPage);
      });
    }

    /* ============================
       ステータス更新
    ============================ */

    /**
     * ステータスバーの選択表示を更新する。
     * @param {string} msg - 表示するメッセージ
     */
    /**
     * 複数選択時のバウンディングボックスに四隅リサイズハンドルを設置する。
     * ハンドルをドラッグすると、全選択オブジェクトが外接矩形に対して比例スケーリングされる。
     * @param {HTMLElement} box - #selectionBoundingBox 要素
     */
    function addBoundingBoxHandles(box) {
      // 既存ハンドルを削除（再描画時の重複防止）
      box.querySelectorAll('.resize-handle').forEach(h => h.remove());

      // コーナー4点 + 各辺中点4点 = 計8ハンドル
      ['tl', 'tc', 'tr', 'ml', 'mr', 'bl', 'bc', 'br'].forEach(corner => {
        const handle = document.createElement('div');
        handle.className = 'resize-handle';
        handle.dataset.corner = corner;

        handle.addEventListener('mousedown', (e) => {
          if (document.body.classList.contains('is-view-mode')) return;
          e.preventDefault();
          e.stopPropagation();

          const startX    = e.clientX;
          const startY    = e.clientY;
          const boxLeft   = parseFloat(box.style.left);
          const boxTop    = parseFloat(box.style.top);
          const boxWidth  = parseFloat(box.style.width);
          const boxHeight = parseFloat(box.style.height);
          const MIN_SIZE  = 20;

          // 各選択オブジェクトの初期状態を記録（アイコン型はリサイズ対象外・位置移動のみ）
          const snapshots = getSelectedObjects()
            .filter(el => !el.classList.contains('ann-icon-obj'))
            .map(el => ({
              el,
              left:   parseFloat(el.style.left)   || 0,
              top:    parseFloat(el.style.top)    || 0,
              width:  el.offsetWidth,
              height: el.offsetHeight,
            }));
          // アイコン型：位置のみ追従（リサイズなし）
          const iconSnapshots = getSelectedObjects()
            .filter(el => el.classList.contains('ann-icon-obj'))
            .map(el => ({
              el,
              left: parseFloat(el.style.left) || 0,
              top:  parseFloat(el.style.top)  || 0,
            }));

          // Shift 軸固定はコーナーハンドルのみ適用（単一選択と同仕様）
          const isCorner = ['tl', 'tr', 'bl', 'br'].includes(corner);
          let axis       = null;
          let prevShift  = false;
          let shiftSnapX = null;
          let shiftSnapY = null;
          let frozenDx   = null;
          let frozenDy   = null;

          const onMove = (ev) => {
            // マウス移動量（視覚座標）をscaleで除してベース座標に変換する
            const scale = zoomLevel / 100;
            let dx = (ev.clientX - startX) / scale;
            let dy = (ev.clientY - startY) / scale;

            if (isCorner && ev.shiftKey) {
              if (!prevShift) {
                shiftSnapX = ev.clientX;
                shiftSnapY = ev.clientY;
                frozenDx   = dx;
                frozenDy   = dy;
                axis       = null;
              }
              const ddx = ev.clientX - shiftSnapX;
              const ddy = ev.clientY - shiftSnapY;
              if (axis === null && (Math.abs(ddx) > 3 || Math.abs(ddy) > 3)) {
                axis = Math.abs(ddx) >= Math.abs(ddy) ? 'h' : 'v';
              }
              if (axis === 'h') dy = frozenDy;
              if (axis === 'v') dx = frozenDx;
            } else if (isCorner) {
              axis       = null;
              shiftSnapX = shiftSnapY = frozenDx = frozenDy = null;
            }
            prevShift = ev.shiftKey;

            let newLeft   = boxLeft;
            let newTop    = boxTop;
            let newWidth  = boxWidth;
            let newHeight = boxHeight;

            if (corner === 'tl') {
              newWidth  = Math.max(boxWidth  - dx, MIN_SIZE);
              newHeight = Math.max(boxHeight - dy, MIN_SIZE);
              newLeft   = boxLeft + boxWidth  - newWidth;
              newTop    = boxTop  + boxHeight - newHeight;
            } else if (corner === 'tc') {
              newHeight = Math.max(boxHeight - dy, MIN_SIZE);
              newTop    = boxTop  + boxHeight - newHeight;
            } else if (corner === 'tr') {
              newWidth  = Math.max(boxWidth  + dx, MIN_SIZE);
              newHeight = Math.max(boxHeight - dy, MIN_SIZE);
              newTop    = boxTop  + boxHeight - newHeight;
            } else if (corner === 'ml') {
              newWidth  = Math.max(boxWidth  - dx, MIN_SIZE);
              newLeft   = boxLeft + boxWidth  - newWidth;
            } else if (corner === 'mr') {
              newWidth  = Math.max(boxWidth  + dx, MIN_SIZE);
            } else if (corner === 'bl') {
              newWidth  = Math.max(boxWidth  - dx, MIN_SIZE);
              newHeight = Math.max(boxHeight + dy, MIN_SIZE);
              newLeft   = boxLeft + boxWidth  - newWidth;
            } else if (corner === 'bc') {
              newHeight = Math.max(boxHeight + dy, MIN_SIZE);
            } else {
              newWidth  = Math.max(boxWidth  + dx, MIN_SIZE);
              newHeight = Math.max(boxHeight + dy, MIN_SIZE);
            }

            const scaleX = newWidth  / boxWidth;
            const scaleY = newHeight / boxHeight;

            // 各オブジェクトをバウンディングボックス基準で比例スケーリング
            snapshots.forEach(({ el, left, top, width, height }) => {
              el.style.left   = (newLeft + (left   - boxLeft) * scaleX) + 'px';
              el.style.top    = (newTop  + (top    - boxTop)  * scaleY) + 'px';
              el.style.width  = (width  * scaleX) + 'px';
              el.style.height = (height * scaleY) + 'px';
            });

            // アイコン型はリサイズせず位置のみ破線に追従
            iconSnapshots.forEach(({ el, left, top }) => {
              el.style.left = (newLeft + (left - boxLeft) * scaleX) + 'px';
              el.style.top  = (newTop  + (top  - boxTop)  * scaleY) + 'px';
            });

            // バウンディングボックス自体を更新
            box.style.left   = newLeft   + 'px';
            box.style.top    = newTop    + 'px';
            box.style.width  = newWidth  + 'px';
            box.style.height = newHeight + 'px';
          };

          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup',   onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup',   onUp);
        });

        box.appendChild(handle);
      });
    }

    /**
     * 現在選択中の全オブジェクト（付箋 + 非sticky）を配列で返す。
     * @returns {HTMLElement[]}
     */
    function getSelectedObjects() {
      const result = [];
      selectedStickySet.forEach(n => result.push(n));
      document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected').forEach(a => result.push(a));
      return result;
    }

    /**
     * ドラッグ選択（ラバーバンド）を確定し、指定矩形内に含まれるオブジェクトを選択状態にする。
     * Shift キーが押されていた場合は既存選択に追加する。
     * @param {number} x           - 選択矩形の左上 X（ページ相対）
     * @param {number} y           - 選択矩形の左上 Y（ページ相対）
     * @param {number} w           - 選択矩形の幅
     * @param {number} h           - 選択矩形の高さ
     * @param {boolean} addToSel   - true の場合は既存選択に追加する
     */
    function finalizeDragSelect(x, y, w, h, addToSel) {
      const selRight  = x + w;
      const selBottom = y + h;

      // Shift なし：既存選択を全解除してからドラッグ範囲で選択
      if (!addToSel) {
        selectedStickySet.forEach(n => n.classList.remove('is-selected'));
        selectedStickySet.clear();
        document.querySelectorAll('.ann-object.is-selected, .ann-icon-obj.is-selected, .daimon-btn.is-selected, .kotae-btn.is-selected, .shomei-btn.is-selected, .pagejump-obj.is-selected').forEach(a => a.classList.remove('is-selected'));
      }

      // 現在ページのオブジェクトのみをチェックして矩形との交差判定
      // （他ページ非表示の .ann-hidden-page 要素は除外）
      const page = document.getElementById('pageLeft');
      page.querySelectorAll('.sticky-note, .ann-object, .ann-icon-obj, .daimon-btn, .kotae-btn, .shomei-btn, .pagejump-obj').forEach(obj => {
        if (obj.classList.contains('ann-hidden-page')) return;
        const l = parseFloat(obj.style.left) || 0;
        const t = parseFloat(obj.style.top)  || 0;
        const r = l + obj.offsetWidth;
        const b = t + obj.offsetHeight;
        // 矩形が一部でも重なっていれば選択対象とする
        const overlaps = r >= x && l <= selRight && b >= y && t <= selBottom;
        if (!overlaps) return;

        if (obj.classList.contains('sticky-note')) {
          selectedStickySet.add(obj);
        }
        obj.classList.add('is-selected');
      });

      const total = getSelectedObjects().length;
      if (total === 1) {
        const sel = getSelectedObjects()[0];
        const type = sel.dataset.type || 'sticky';
        openAnnotationSettingsDialog(type, sel);
        updateStatus(
          sel.classList.contains('sticky-note')
            ? '付箋を選択中'
            : `${ANNOTATION_TYPE_CONFIG[type]?.label ?? type}を選択中`
        );
      } else if (total > 1) {
        updateStatus(`${total} 件のオブジェクトを選択中`);
        updateAlignPanel();
      } else {
        updateStatus('オブジェクトが見つかりませんでした');
      }
    }

    /**
     * 選択数に応じて整列パネルの有効/グレーアウトを切り替え、
     * 複数選択時は外接バウンディングボックスを #pageLeft 上に描画する。
     * 選択が2件未満の場合はボックスを削除する。
     */
    function updateAlignPanel() {
      const panel = document.getElementById('alignPanel');
      if (!panel) return;
      const els = getSelectedObjects();
      const count = els.length;
      panel.classList.toggle('is-disabled', count < 2);
      // 複数選択クラスを body に反映（個別ハンドルの表示切替に使用）
      document.body.classList.toggle('is-multi-select', count >= 2);

      const existing = document.getElementById('selectionBoundingBox');
      if (count < 2) {
        if (existing) existing.remove();
        return;
      }

      // 外接バウンディングボックスを算出して描画
      const pageEl     = document.getElementById('pageLeft');
      const pageOrigin = pageEl.getBoundingClientRect();
      const rects = els.map(el => {
        const cr = el.getBoundingClientRect();
        return {
          l: cr.left  - pageOrigin.left,
          t: cr.top   - pageOrigin.top,
          r: cr.right - pageOrigin.left,
          b: cr.bottom - pageOrigin.top,
        };
      });
      const minL = Math.min(...rects.map(r => r.l));
      const minT = Math.min(...rects.map(r => r.t));
      const maxR = Math.max(...rects.map(r => r.r));
      const maxB = Math.max(...rects.map(r => r.b));

      // getBoundingClientRectの値は視覚座標のため、
      // #pageLeftの子要素として配置する際はscaleで除してベース座標に変換する。
      const scale = zoomLevel / 100;
      const box = existing || document.createElement('div');
      box.id = 'selectionBoundingBox';
      box.style.left   = minL / scale + 'px';
      box.style.top    = minT / scale + 'px';
      box.style.width  = (maxR - minL) / scale + 'px';
      box.style.height = (maxB - minT) / scale + 'px';
      if (!existing) pageEl.appendChild(box);

      // バウンディングボックスにリサイズハンドルを設置
      addBoundingBoxHandles(box);
    }

    /**
     * 選択中のオブジェクトを指定モードで整列する。
     * @param {'left'|'centerH'|'right'|'top'|'centerV'|'bottom'} mode
     */
    function alignObjects(mode) {
      const els = getSelectedObjects();
      if (els.length < 2) return;

      // getBoundingClientRectの値は視覚座標のため、scaleで除してベース座標に変換する。
      // el.style.left/topにそdirectに代入できる形式にする。
      const scale      = zoomLevel / 100;
      const pageOrigin = document.getElementById('pageLeft').getBoundingClientRect();
      const rects = els.map(el => {
        const cr = el.getBoundingClientRect();
        const l = (cr.left  - pageOrigin.left) / scale;
        const t = (cr.top   - pageOrigin.top)  / scale;
        const w = cr.width  / scale;
        const h = cr.height / scale;
        return { el, l, t, w, h };
      });

      // Undo用: 整列前の位置を記録
      const prevTargets = rects.map(({ el, l, t }) => ({ el, prevLeft: parseFloat(el.style.left) || l, prevTop: parseFloat(el.style.top) || t }));

      // 外接バウンディングボックス（全オブジェクトを包含する最小矩形）
      const minL   = Math.min(...rects.map(r => r.l));
      const maxR   = Math.max(...rects.map(r => r.l + r.w));
      const minT   = Math.min(...rects.map(r => r.t));
      const maxB   = Math.max(...rects.map(r => r.t + r.h));
      const centerX = (minL + maxR) / 2;
      const centerY = (minT + maxB) / 2;

      // 整列後の位置を計算し、Undo用にafter値も記録
      const afterTargets = [];
      rects.forEach(({ el, l, t, w, h }) => {
        let afterLeft = parseFloat(el.style.left) || l;
        let afterTop  = parseFloat(el.style.top)  || t;
        switch (mode) {
          case 'left':    afterLeft = minL; break;
          case 'centerH': afterLeft = centerX - w / 2; break;
          case 'right':   afterLeft = maxR - w; break;
        }
        switch (mode) {
          case 'top':     afterTop = minT; break;
          case 'centerV': afterTop = centerY - h / 2; break;
          case 'bottom':  afterTop = maxB - h; break;
        }
        // 実際に移動する場合のみ記録
        afterTargets.push({ el, afterLeft, afterTop });
        el.style.left = afterLeft + 'px';
        el.style.top  = afterTop  + 'px';
      });

      // Undoスタックに積む（移動が発生した場合のみ）
      const changed = prevTargets.some((t, i) => t.prevLeft !== afterTargets[i].afterLeft || t.prevTop !== afterTargets[i].afterTop);
      if (changed) {
        // prevTargetsとafterTargetsをマージしてpushUndo
        const targets = prevTargets.map((t, i) => ({ el: t.el, prevLeft: t.prevLeft, prevTop: t.prevTop, afterLeft: afterTargets[i].afterLeft, afterTop: afterTargets[i].afterTop }));
        pushUndo({ type: 'move', targets });
      }

      const labelMap = { left:'水平左揃え', centerH:'水平中央揃え', right:'水平右揃え',
                         top:'垂直上揃え',  centerV:'垂直中央揃え',  bottom:'垂直下揃え' };
      updateStatus(`${labelMap[mode]}を実行しました（${els.length}件）`);
    }

    function updateStatus(msg) {
      // 選択数に応じて整列パネルの活性状態を更新
      updateAlignPanel();
    }

    /* ============================
       初期表示・リサイズ対応
    ============================ */
    // 高さフィットボタンを初期選択状態にする
    document.querySelectorAll('.fit-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.fit-btn')[1].classList.add('selected');

    // 初回リサイズ
    resizePage();

    // ウィンドウリサイズ時に追従（アノテーションもページサイズ変化に追従する）
    window.addEventListener('resize', () => {
      const page = document.getElementById('pageLeft');
      const oldW = page.offsetWidth;
      resizePage();
      const newW = page.offsetWidth;
      if (oldW > 0 && newW !== oldW) {
        scaleAnnotations(newW / oldW);
        // ページCSSサイズ変更後にPDFcanvasを新サイズで再描画
        if (pdfDoc) renderPage(currentPage);
      }
      // B-6: 比率ベースのアノテーションをリサイズ後に再配置
      repositionAnnotationsByRatio();
    });

    /* ============================
       マウスホイールによるズーム
    ============================ */

    /**
     * ビューエリア上でホイール操作を行うとページを拡大・縮小する。
     * マウスカーソルの位置を中心にズームする。
     * パンモード中（Space キー押下時）は縮小・拡大を行わない。
     */
    document.getElementById('viewArea').addEventListener('wheel', (e) => {
      e.preventDefault();

      // パンモード中はホイールを無視する
      if (isSpaceHeld) return;

      // ズームステップ：ホイール1ノッチあたり10%
      const delta = e.deltaY < 0 ? 10 : -10;
      const newZoom = Math.min(200, Math.max(50, zoomLevel + delta));
      // マウスカーソル位置を中心としてズームを適用する
      applyZoomChange(newZoom, e.clientX, e.clientY);
    }, { passive: false });

    /* ============================
       ページ入力イベント
    ============================ */
    document.getElementById('pageInput').addEventListener('change', function() {
      const max = parseInt(this.dataset.max || totalPages, 10);
      const v = parseInt(this.value, 10);
      if (!isNaN(v) && v >= 1 && v <= max) {
        currentPage = v;
        updatePageDisplay();
      } else {
        this.value = currentPage;
      }
    });

    // PDFを読み込む
    loadPDF(PDF_PATH);

    // ============================
    // ツールチップ（position:fixed でoverflow制限を回避）
    // ============================
    (function() {
      const tip = document.createElement('div');
      tip.id = 'globalTooltip';
      document.body.appendChild(tip);

      let timer = null;

      function showTip(target) {
        const text = target.getAttribute('data-tip');
        if (!text) return;
        tip.textContent = text;
        tip.style.display = 'block';
        tip.style.opacity = '0';

        const rect = target.getBoundingClientRect();
        const tw = tip.offsetWidth;
        const th = tip.offsetHeight;
        const gap = 6;

        // 上に十分なスペースがあれば上表示、なければ下表示
        let top = rect.top - th - gap;
        if (top < 4) top = rect.bottom + gap;

        // 横方向：中央揃えしてはみ出しをクランプ
        let left = rect.left + rect.width / 2 - tw / 2;
        left = Math.max(4, Math.min(left, window.innerWidth - tw - 4));

        tip.style.top  = top  + 'px';
        tip.style.left = left + 'px';
        tip.style.opacity = '1';
      }

      document.addEventListener('mouseover', function(e) {
        const target = e.target.closest('[data-tip]');
        if (!target) return;
        clearTimeout(timer);
        timer = setTimeout(() => showTip(target), 600);
      });

      document.addEventListener('mouseout', function(e) {
        const target = e.target.closest('[data-tip]');
        if (!target) return;
        clearTimeout(timer);
        tip.style.opacity = '0';
        tip.style.display = 'none';
      });
    })();

  </script>

</body>
</html>
