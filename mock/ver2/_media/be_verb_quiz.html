<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高校英語 Be動詞インタラクティブ問題</title>
  <style>
    /* ===========================
       基本レイアウト
    =========================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f4f7fb;
      color: #333;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, #1a5e3a 0%, #2e8b57 100%);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    header .badge {
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 11px;
    }

    /* スコアバー */
    #scoreBar {
      background: #fff;
      border-bottom: 1px solid #dde3ee;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
    }
    #scoreBar .score-label { color: #666; }
    #scoreBar .score-val { font-weight: 700; color: #2e8b57; font-size: 15px; }
    #scoreBar .progress-wrap {
      flex: 1;
      height: 6px;
      background: #e0e7f0;
      border-radius: 3px;
      overflow: hidden;
    }
    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, #2e8b57, #66cdaa);
      border-radius: 3px;
      transition: width 0.4s;
      width: 0%;
    }

    /* メインエリア */
    main {
      padding: 20px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* 問題カード */
    .quiz-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 16px;
    }
    .quiz-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .quiz-num {
      background: #2e8b57;
      color: #fff;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .quiz-category {
      font-size: 11px;
      color: #888;
      background: #f0f4f8;
      border-radius: 10px;
      padding: 2px 9px;
    }
    .quiz-question {
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 16px;
      color: #222;
    }
    .quiz-question .blank {
      display: inline-block;
      min-width: 80px;
      border-bottom: 2px solid #2e8b57;
      text-align: center;
      color: #2e8b57;
      font-weight: 700;
      padding: 0 4px;
    }

    /* 選択肢 */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .choice-btn {
      background: #f4f7fb;
      border: 2px solid #dde3ee;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.5;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #2e8b57;
      background: #e8f5ee;
    }
    .choice-btn.correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
    }
    .choice-btn.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
    }
    .choice-btn:disabled { cursor: default; }

    /* 解説 */
    .explanation {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      background: #f0fdf4;
      border-left: 3px solid #22c55e;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.7;
      color: #14532d;
    }
    .explanation.show { display: block; }
    .explanation strong { color: #15803d; }

    /* 次へボタン */
    .next-btn {
      display: none;
      margin-top: 16px;
      width: 100%;
      padding: 11px;
      background: #2e8b57;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .next-btn:hover { background: #1f6b3e; }
    .next-btn.show { display: block; }

    /* 結果画面 */
    #resultScreen {
      display: none;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 36px 24px;
      text-align: center;
    }
    #resultScreen.show { display: block; }
    .result-score {
      font-size: 48px;
      font-weight: 700;
      color: #2e8b57;
      margin: 12px 0;
    }
    .result-msg {
      font-size: 16px;
      color: #555;
      margin-bottom: 24px;
    }
    .retry-btn {
      padding: 12px 36px;
      background: #2e8b57;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #1f6b3e; }
  </style>
</head>
<body>

<header>
  <h1>高校英語 Be動詞インタラクティブ問題</h1>
  <span class="badge">Be Verbs</span>
</header>

<div id="scoreBar">
  <span class="score-label">正解</span>
  <span class="score-val" id="scoreVal">0</span>
  <span class="score-label">/</span>
  <span class="score-val" id="totalVal">0</span>
  <div class="progress-wrap"><div id="progressBar"></div></div>
  <span id="qNumLabel" style="color:#888;font-size:12px;">問1 / 10</span>
</div>

<main>
  <div id="quizArea"></div>
  <div id="resultScreen">
    <div style="font-size:20px;font-weight:700;color:#1a5e3a;">クイズ終了！</div>
    <div class="result-score" id="finalScore">0 / 10</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="retry-btn" onclick="startQuiz()">もう一度挑戦</button>
  </div>
</main>

<script>
  /**
   * Be動詞クイズ問題データ（10問）
   * 現在形・過去形・疑問文・否定文・進行形・受動態・There be構文を網羅
   */
  const QUESTIONS = [
    {
      category: 'Be動詞 現在形',
      question: 'She ( ___ ) a high school student.',
      choices: ['is', 'am', 'are', 'be'],
      answer: 0,
      explanation: '三人称単数（She）の現在形には <strong>is</strong> を使います。<br>am → I のみ / are → you・複数 / is → he・she・it・単数名詞'
    },
    {
      category: 'Be動詞 現在形',
      question: 'You and I ( ___ ) in the same class.',
      choices: ['are', 'is', 'am', 'was'],
      answer: 0,
      explanation: '「You and I」は複数扱いのため <strong>are</strong> を使います。2つ以上のものが主語になる場合は複数扱いです。'
    },
    {
      category: 'Be動詞 過去形',
      question: 'The students ( ___ ) very tired after the exam.',
      choices: ['were', 'was', 'are', 'be'],
      answer: 0,
      explanation: '「The students」は複数のため、過去形は <strong>were</strong> です。<br>単数過去形: was（I was / he was）/ 複数過去形: were（they were）'
    },
    {
      category: 'Be動詞 疑問文',
      question: '( ___ ) your brother a doctor?',
      choices: ['Is', 'Are', 'Was', 'Does'],
      answer: 0,
      explanation: '「your brother」は三人称単数のため、現在形の疑問文は <strong>Is</strong> で始めます。<br>Is he / she / it / 単数名詞 ～ ? の形です。'
    },
    {
      category: 'Be動詞 否定文',
      question: 'I ( ___ ) not ready for the presentation yet.',
      choices: ['am', 'is', 'are', 'was'],
      answer: 0,
      explanation: '主語が「I」のとき、be動詞は <strong>am</strong> です。否定文は "I am not ..." となります。短縮形は I\'m not（I amn\'t とはなりません）。'
    },
    {
      category: '現在進行形',
      question: 'They ( ___ ) playing soccer in the park now.',
      choices: ['are', 'is', 'am', 'were'],
      answer: 0,
      explanation: '現在進行形は <strong>be動詞 + 動詞の-ing形</strong>。「They」（複数）には <strong>are</strong> を使います。<br>They are playing ...'
    },
    {
      category: '過去進行形',
      question: 'She ( ___ ) studying when I called her.',
      choices: ['was', 'were', 'is', 'has'],
      answer: 0,
      explanation: '過去進行形は <strong>was / were + 動詞の-ing形</strong>。三人称単数「She」には <strong>was</strong> を使います。<br>"when I called"（過去）が基準時点です。'
    },
    {
      category: '受動態',
      question: 'This letter ( ___ ) written by my grandmother.',
      choices: ['was', 'were', 'is being', 'has'],
      answer: 0,
      explanation: '受動態（過去）は <strong>was / were + 過去分詞</strong>。「This letter」は単数なので <strong>was</strong> written となります。<br>能動: My grandmother wrote this letter.'
    },
    {
      category: 'Be動詞 定型表現',
      question: 'How ( ___ ) you? — I ( ___ ) fine, thank you.',
      choices: ['are / am', 'is / am', 'are / is', 'am / are'],
      answer: 0,
      explanation: '"How are you?" は定型の挨拶表現（you → are）。<br>答えは "I am fine."（I → am）。<strong>are / am</strong> が正解です。'
    },
    {
      category: 'There be 構文',
      question: 'There ( ___ ) many students in the library yesterday.',
      choices: ['were', 'was', 'are', 'is'],
      answer: 0,
      explanation: '"There be ..." 構文では、<strong>後ろの名詞</strong>に be動詞を一致させます。<br>「many students」は複数・過去のため <strong>were</strong> が正解です。<br>（例: There is a book. / There are books.）'
    }
  ];

  // --- 状態変数 ---
  let currentIndex = 0;
  let score = 0;

  /**
   * クイズを最初から開始する
   */
  function startQuiz() {
    currentIndex = 0;
    score = 0;
    document.getElementById('scoreVal').textContent = '0';
    document.getElementById('totalVal').textContent = '0';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('resultScreen').classList.remove('show');
    showQuestion();
  }

  /**
   * 現在のインデックスに対応する問題を描画する
   */
  function showQuestion() {
    const q = QUESTIONS[currentIndex];
    document.getElementById('qNumLabel').textContent =
      `問${currentIndex + 1} / ${QUESTIONS.length}`;

    const card = document.createElement('div');
    card.className = 'quiz-card';

    /* 空欄を視覚的な下線スパンに変換 */
    const questionHTML = q.question.replace(
      '( ___ )',
      '<span class="blank">　　</span>'
    );

    card.innerHTML = `
      <div class="quiz-meta">
        <div class="quiz-num">${currentIndex + 1}</div>
        <span class="quiz-category">${q.category}</span>
      </div>
      <div class="quiz-question">${questionHTML}</div>
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice-btn" onclick="selectAnswer(${i}, this)">${c}</button>
        `).join('')}
      </div>
      <div class="explanation" id="exp-${currentIndex}">${q.explanation}</div>
      <button class="next-btn" id="nextBtn-${currentIndex}" onclick="nextQuestion()">
        ${currentIndex < QUESTIONS.length - 1 ? '次の問題へ →' : '結果を見る'}
      </button>
    `;

    const area = document.getElementById('quizArea');
    area.innerHTML = '';
    area.appendChild(card);
  }

  /**
   * 選択肢が選ばれたときの処理
   * @param {number} selectedIndex - 選択された選択肢のインデックス
   * @param {HTMLElement} btn - クリックされたボタン要素
   */
  function selectAnswer(selectedIndex, btn) {
    const q = QUESTIONS[currentIndex];
    const allBtns = btn.closest('.choices').querySelectorAll('.choice-btn');

    /* すべての選択肢ボタンを無効化 */
    allBtns.forEach(b => b.disabled = true);

    if (selectedIndex === q.answer) {
      btn.classList.add('correct');
      score++;
      document.getElementById('scoreVal').textContent = score;
    } else {
      btn.classList.add('wrong');
      allBtns[q.answer].classList.add('correct');
    }

    /* 進捗バー・回答済みカウントを更新 */
    document.getElementById('totalVal').textContent = currentIndex + 1;
    const pct = ((currentIndex + 1) / QUESTIONS.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';

    /* 解説と次へボタンを表示 */
    document.getElementById(`exp-${currentIndex}`).classList.add('show');
    document.getElementById(`nextBtn-${currentIndex}`).classList.add('show');
  }

  /**
   * 次の問題へ進む、または結果画面を表示する
   */
  function nextQuestion() {
    currentIndex++;
    if (currentIndex < QUESTIONS.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  /**
   * 最終スコアと評価メッセージを表示する
   */
  function showResult() {
    document.getElementById('quizArea').innerHTML = '';
    const pct = Math.round((score / QUESTIONS.length) * 100);
    const msg =
      pct === 100 ? '完璧です！Be動詞を完全にマスターしました！' :
      pct >= 80   ? 'よくできました！あと少しで完璧です。' :
      pct >= 60   ? 'もう少し！間違えた問題を復習しましょう。' :
                    'Be動詞の基本をもう一度確認しましょう。';
    document.getElementById('finalScore').textContent =
      `${score} / ${QUESTIONS.length}`;
    document.getElementById('resultMsg').textContent = msg;
    document.getElementById('resultScreen').classList.add('show');
  }

  /* ページ読み込み時にクイズを開始 */
  startQuiz();
</script>
</body>
</html>
