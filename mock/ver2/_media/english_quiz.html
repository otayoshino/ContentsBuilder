<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高校英語 文法・語彙クイズ</title>
  <style>
    /* ===========================
       基本レイアウト
    =========================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f4f7fb;
      color: #333;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, #1a3a6b 0%, #2563b0 100%);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    header .badge {
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 11px;
    }

    /* スコアバー */
    #scoreBar {
      background: #fff;
      border-bottom: 1px solid #dde3ee;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
    }
    #scoreBar .score-label { color: #666; }
    #scoreBar .score-val { font-weight: 700; color: #2563b0; font-size: 15px; }
    #scoreBar .progress-wrap {
      flex: 1;
      height: 6px;
      background: #e0e7f0;
      border-radius: 3px;
      overflow: hidden;
    }
    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, #2563b0, #38bdf8);
      border-radius: 3px;
      transition: width 0.4s;
      width: 0%;
    }

    /* メインエリア */
    main {
      padding: 20px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* 問題カード */
    .quiz-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 16px;
    }
    .quiz-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .quiz-num {
      background: #2563b0;
      color: #fff;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .quiz-category {
      font-size: 11px;
      color: #888;
      background: #f0f4f8;
      border-radius: 10px;
      padding: 2px 9px;
    }
    .quiz-question {
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 16px;
      color: #222;
    }
    .quiz-question .blank {
      display: inline-block;
      min-width: 80px;
      border-bottom: 2px solid #2563b0;
      text-align: center;
      color: #2563b0;
      font-weight: 700;
      padding: 0 4px;
    }

    /* 選択肢 */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .choice-btn {
      background: #f4f7fb;
      border: 2px solid #dde3ee;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.5;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #2563b0;
      background: #ebf2ff;
    }
    .choice-btn.correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
    }
    .choice-btn.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
    }
    .choice-btn:disabled { cursor: default; }

    /* 解説 */
    .explanation {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      background: #f0f9ff;
      border-left: 3px solid #38bdf8;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.7;
      color: #0c4a6e;
    }
    .explanation.show { display: block; }
    .explanation strong { color: #0369a1; }

    /* 次へボタン */
    .next-btn {
      display: none;
      margin-top: 16px;
      width: 100%;
      padding: 11px;
      background: #2563b0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .next-btn:hover { background: #1d4ed8; }
    .next-btn.show { display: block; }

    /* 結果画面 */
    #resultScreen {
      display: none;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 36px 24px;
      text-align: center;
    }
    #resultScreen.show { display: block; }
    .result-score {
      font-size: 48px;
      font-weight: 700;
      color: #2563b0;
      margin: 12px 0;
    }
    .result-msg {
      font-size: 16px;
      color: #555;
      margin-bottom: 24px;
    }
    .retry-btn {
      padding: 12px 36px;
      background: #2563b0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>

<header>
  <h1>高校英語 文法・語彙クイズ</h1>
  <span class="badge">Grammar &amp; Vocabulary</span>
</header>

<div id="scoreBar">
  <span class="score-label">正解</span>
  <span class="score-val" id="scoreVal">0</span>
  <span class="score-label">/</span>
  <span class="score-val" id="totalVal">0</span>
  <div class="progress-wrap"><div id="progressBar"></div></div>
  <span id="qNumLabel" style="color:#888;font-size:12px;">問1 / 8</span>
</div>

<main>
  <div id="quizArea"></div>
  <div id="resultScreen">
    <div style="font-size:20px;font-weight:700;color:#1a3a6b;">クイズ終了！</div>
    <div class="result-score" id="finalScore">0 / 8</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="retry-btn" onclick="startQuiz()">もう一度挑戦</button>
  </div>
</main>

<script>
  /**
   * クイズ問題データ
   * 高校英語の文法・語彙問題（8問）
   */
  const QUESTIONS = [
    {
      category: '時制',
      question: 'By the time she arrived, we ( ___ ) dinner.',
      choices: ['had finished', 'finished', 'have finished', 'were finishing'],
      answer: 0,
      explanation: '<strong>過去完了形</strong>（had + 過去分詞）は、過去のある時点より前に完了した動作を表します。"by the time she arrived"（彼女が到着した時点）より前に夕食が終わっていたので、過去完了形 <strong>had finished</strong> が正解です。'
    },
    {
      category: '語彙',
      question: 'The scientist made a remarkable ( ___ ) that changed modern medicine.',
      choices: ['discovery', 'recover', 'discover', 'recovery'],
      answer: 0,
      explanation: '<strong>discovery</strong>（発見）は名詞です。make a discovery で「発見をする」という意味になります。discover は動詞、recovery は「回復」の意味になるので不正解です。'
    },
    {
      category: '不定詞',
      question: 'She was ( ___ ) to find that her bag had been stolen.',
      choices: ['shocked', 'shocking', 'shock', 'shockingly'],
      answer: 0,
      explanation: '感情を表す形容詞は、人が主語の場合は <strong>-ed 形</strong>（shocked）を使います。"She was shocked to find..."「～を知ってショックを受けた」という感情受動の表現です。shocking は物・事が主語の場合に使います。'
    },
    {
      category: '前置詞',
      question: 'He has been living in Tokyo ( ___ ) ten years.',
      choices: ['for', 'since', 'during', 'from'],
      answer: 0,
      explanation: '<strong>for</strong> は「期間の長さ」を表します（for ten years = 10年間）。since は「起点」を表す（since 2014 など）ので、数値の期間には使いません。'
    },
    {
      category: '関係代名詞',
      question: 'The book ( ___ ) I borrowed from the library was very interesting.',
      choices: ['that', 'who', 'whom', 'whose'],
      answer: 0,
      explanation: '先行詞が「物」（the book）で、関係節内で目的語の役割をしています。<strong>that</strong> または which が使えます。who / whom は先行詞が人の場合に使います。'
    },
    {
      category: '語彙',
      question: 'Please ( ___ ) the document before submitting it.',
      choices: ['proofread', 'forecast', 'overlook', 'undermine'],
      answer: 0,
      explanation: '<strong>proofread</strong>は「校正する・見直す」という意味です。提出前に文書を確認するという文脈に最も適しています。overlookは「見落とす」、undermineは「損なう」の意味です。'
    },
    {
      category: '仮定法',
      question: 'If I ( ___ ) more time, I would travel around the world.',
      choices: ['had', 'have', 'would have', 'have had'],
      answer: 0,
      explanation: '<strong>仮定法過去</strong>は現在の事実と反対の仮定を表します。If 節には過去形（had）を使い、主節には would + 動詞の原形を使います。「もし時間があれば（実際にはない）」という意味になります。'
    },
    {
      category: '受動態',
      question: 'The new bridge ( ___ ) by next spring.',
      choices: ['will have been completed', 'will complete', 'has been completed', 'was completed'],
      answer: 0,
      explanation: '"by next spring"（来春までに）は未来の完了を表すため、<strong>未来完了形の受動態</strong>（will have been + 過去分詞）が正解です。主語 the bridge は「完成される」側なので受動態を使います。'
    },
  ];

  let currentIndex = 0;
  let score = 0;
  let answered = false;

  /**
   * クイズを初期化して最初の問題を表示する
   */
  function startQuiz() {
    currentIndex = 0;
    score = 0;
    answered = false;
    document.getElementById('resultScreen').classList.remove('show');
    document.getElementById('quizArea').style.display = '';
    updateScoreBar();
    showQuestion();
  }

  /**
   * スコアバーを更新する
   */
  function updateScoreBar() {
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('totalVal').textContent = currentIndex;
    document.getElementById('qNumLabel').textContent = `問${currentIndex + 1} / ${QUESTIONS.length}`;
    const pct = (currentIndex / QUESTIONS.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
  }

  /**
   * 現在のインデックスの問題を表示する
   */
  function showQuestion() {
    answered = false;
    const q = QUESTIONS[currentIndex];
    const blankedQ = q.question.replace('( ___ )', '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
    const choicesHTML = q.choices.map((c, i) =>
      `<button class="choice-btn" onclick="selectAnswer(${i})">${c}</button>`
    ).join('');

    document.getElementById('quizArea').innerHTML = `
      <div class="quiz-card">
        <div class="quiz-meta">
          <div class="quiz-num">${currentIndex + 1}</div>
          <span class="quiz-category">${q.category}</span>
        </div>
        <div class="quiz-question">${blankedQ}</div>
        <div class="choices">${choicesHTML}</div>
        <div class="explanation" id="explanation"></div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
          ${currentIndex + 1 < QUESTIONS.length ? '次の問題へ →' : '結果を見る'}
        </button>
      </div>
    `;
    updateScoreBar();
  }

  /**
   * 回答を選択したときの処理
   * @param {number} idx - 選択した選択肢のインデックス
   */
  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    const q = QUESTIONS[currentIndex];
    const btns = document.querySelectorAll('.choice-btn');

    // 正誤判定と色付け
    btns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add('correct');
      else if (i === idx) btn.classList.add('wrong');
    });

    // 正解時スコア加算
    if (idx === q.answer) score++;

    // 解説表示
    const exp = document.getElementById('explanation');
    exp.innerHTML = (idx === q.answer ? '✅ 正解！ ' : '❌ 不正解。') + q.explanation;
    exp.classList.add('show');

    // 次へボタン表示
    document.getElementById('nextBtn').classList.add('show');

    // スコアバー更新（回答済みとしてカウント）
    document.getElementById('totalVal').textContent = currentIndex + 1;
    document.getElementById('scoreVal').textContent = score;
  }

  /**
   * 次の問題へ進む、または結果画面を表示する
   */
  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= QUESTIONS.length) {
      showResult();
    } else {
      showQuestion();
      updateScoreBar();
    }
  }

  /**
   * 結果画面を表示する
   */
  function showResult() {
    document.getElementById('quizArea').style.display = 'none';
    const rs = document.getElementById('resultScreen');
    rs.classList.add('show');
    document.getElementById('finalScore').textContent = `${score} / ${QUESTIONS.length}`;
    document.getElementById('progressBar').style.width = '100%';

    // 成績メッセージ
    const pct = score / QUESTIONS.length;
    let msg;
    if (pct >= 0.875) msg = '🎉 満点に近い成績です！素晴らしい！';
    else if (pct >= 0.625) msg = '👍 よくできています！もう一歩で満点！';
    else if (pct >= 0.375) msg = '📚 復習してもう一度挑戦しましょう。';
    else msg = '🔍 基礎から丁寧に確認しましょう。';
    document.getElementById('resultMsg').textContent = msg;
  }

  // クイズ開始
  startQuiz();
</script>
</body>
</html>
